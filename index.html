'19':{id:'Ind AS 19',title:'Employee Benefits — Gratuity, PF & Leave',color:'#059669',bg:'#ecfdf5',complexity:'High',
  keywords:['gratuity','employee benefits','provident fund','pf','pension','dbo','defined benefit','leave encashment','actuarial','employee','salary','bonus','esic','superannuation','actuarial valuation','defined contribution'],
  keyParas:['Para 7','Para 8-86','Para 120-152'],
  financialImpact:{
    balanceSheet:[
      {section:'Non-Current Liabilities',item:'Defined Benefit Obligation (DBO) Net of Plan Assets',treatment:'Net Liability = DBO (PV of future gratuity/pension obligations) − Fair Value of Plan Assets (amount invested in LIC/fund). If plan assets \u003E DBO → Net Asset (shown under assets, subject to asset ceiling test).',movement:'Increases liabilities; fluctuates annually with actuarial assumptions'},
    ],
    pandl:[
      {item:'Service Cost',treatment:'Current Service Cost (cost of benefit earned by employees this year) → P&L. Past Service Cost (benefit improvement for prior service, e.g., gratuity limit increase) → P&L immediately.',direction:'Operating expense — typically 1-3% of payroll cost'},
      {item:'Net Interest Cost',treatment:'Net Interest = DBO × Discount Rate − Plan Assets × Expected Return. Goes to P&L as Finance Cost.',direction:'Finance cost — not operating expense'},
      {item:'Actuarial Gains/Losses → OCI ONLY',treatment:'Changes in DBO/plan assets due to changes in actuarial assumptions (discount rate, salary growth, attrition) OR experience adjustments (actual vs expected) → GO TO OCI. Never to P&L. NEVER recycled to P&L.',direction:'OCI — directly to equity; not in P&L'},
    ],
    ratioImpact:[
      {ratio:'Total Comprehensive Income',direction:'Volatile',reason:'Actuarial losses (large in low interest rate environments) hit OCI'},
      {ratio:'EBITDA',direction:'↑ SLIGHTLY HIGHER',reason:'Net interest cost is below EBITDA line; only service cost is operating'},
    ]
  },
  steps:[
    {n:'Step 1',title:'Classify Employee Benefits',para:'Para 7',detail:'Short-term benefits (due within 12 months): salaries, ESIC, bonus — recognise as expense when employee renders service. SIMPLE. Post-employment benefits (after employment ends): Defined Contribution (PF, superannuation — fixed employer contribution, no actuarial risk for employer) vs Defined Benefit (gratuity, pension — employer bears actuarial risk). Long-term benefits (leave encashment, long-service awards). Termination benefits (VRS, retrenchment compensation).'},
    {n:'Step 2',title:'Defined Contribution — Simple Recognition',para:'Para 43-47',detail:'Employer contributes a FIXED amount (e.g., 12% of basic salary to EPF). Obligation ends when contribution is paid. No actuarial risk. Recognise contribution as expense in P&L when employee renders service. Example: 12% of ₹10 lakh salary = ₹1.2 lakh per year → straight expense.'},
    {n:'Step 3',title:'Defined Benefit — Actuarial Valuation Required',para:'Para 55-86',detail:'Gratuity is the most common. Require an ACTUARY (expert) every year to calculate the DBO using the Projected Unit Credit Method. Key actuarial assumptions: (a) Discount rate (yield on government bonds of matching duration — typically 7-7.5% for India), (b) Salary escalation rate (typically 7-10%), (c) Attrition rates by age/grade, (d) Mortality rates (from Indian Assured Lives Mortality tables). DBO = PV of all future gratuity payments for current employees based on projected final salaries.'},
    {n:'Step 4',title:'Measurement — Three Components',para:'Para 120-152',detail:'(1) Service Cost → P&L (current service + past service cost). (2) Net Interest → P&L (DBO × discount rate − plan assets × same discount rate). (3) Remeasurements (actuarial gains/losses + difference between actual and expected return on plan assets) → OCI PERMANENTLY. Never recycled to P&L. This means that a large actuarial loss (e.g., due to salary revision or mortality assumption change) reduces equity directly without going through P&L.'},
  ],
  disclosures:[
    {head:'DBO Movement Table (Para 140)',body:'Opening DBO + current service cost + past service cost + interest cost − benefits paid ± actuarial gains/losses = Closing DBO. Similarly for plan assets. Net liability closing.'},
    {head:'Actuarial Assumptions (Para 144)',body:'Disclose all key assumptions: discount rate, expected salary increases, mortality rates, attrition rates. Also provide sensitivity analysis — what happens to DBO if discount rate changes by ±0.5%? If salary growth changes by ±0.5%?'},
  ],
  auditRisks:[
    {risk:'Actuarial assumptions — are they realistic?',level:'High',proc:'Challenge discount rate (compare to published G-sec yields of matching duration), salary escalation (compare to historical trends and industry), and attrition rates (compare to actual HR data). Overly optimistic assumptions reduce DBO and understate the liability.'},
    {risk:'Actuarial gains/losses in OCI — are they correctly classified?',level:'Medium',proc:'Ensure no actuarial gains/losses are routed through P&L. Reconcile total comprehensive income — actuarial amounts should appear in OCI, not P&L.'},
  ],
  followUps:['How is gratuity calculated step by step?','What goes to P&L vs OCI under Ind AS 19?','How does a salary revision affect the DBO?'],
},

'21':{id:'Ind AS 21',title:'Effects of Changes in Foreign Exchange Rates',color:'#d946ef',bg:'#fdf4ff',complexity:'Medium',
  keywords:['foreign exchange','forex','currency','usd','eur','functional currency','translation','monetary','non-monetary','exchange rate','fx','foreign currency','dollar','euro','foreign operation','subsidiary abroad'],
  keyParas:['Para 8','Para 20-37','Para 38-49'],
  financialImpact:{
    balanceSheet:[
      {section:'Monetary Items (Receivables, Payables, Loans in FC)',item:'Restated at Closing Rate',treatment:'All monetary items denominated in foreign currency are translated at the CLOSING rate (Balance Sheet date rate). The gain/loss from this restatement goes to P&L.',movement:'Changes each reporting date with exchange rate movement'},
      {section:'Non-Monetary Items (PPE, Intangibles in FC)',item:'Historical Rate (Cost Model)',treatment:'Translated at the exchange rate on the date of transaction (historical rate). NOT retranslated subsequently. No P&L impact from rate changes.',movement:'Fixed at historical rate — no forex P&L on these'},
    ],
    pandl:[
      {item:'Foreign Exchange Gain/Loss',treatment:'Difference from restating monetary items (receivables, payables, loans) at closing rate vs carrying rate. If INR weakens vs USD: (a) Exporter with USD receivables gets a P&L GAIN. (b) Importer with USD payables gets a P&L LOSS. (c) Company with USD borrowings gets a P&L LOSS.',direction:'Volatile — driven by currency movements'},
      {item:'Translation of Foreign Subsidiary (Ind AS 21 Para 38-49)',treatment:'Assets and liabilities: CLOSING RATE. P&L items: AVERAGE RATE for the period. Exchange differences from this translation → go to FOREIGN CURRENCY TRANSLATION RESERVE (FCTR) in OCI. Recycled to P&L only when the foreign operation is sold/wound up.',direction:'OCI — not in P&L until disposal of subsidiary'},
    ],
    ratioImpact:[
      {ratio:'P&L',direction:'Volatile',reason:'Forex gain/loss on monetary items hits P&L — especially for import-heavy or debt-heavy companies'},
      {ratio:'OCI',direction:'Significant',reason:'Translation differences for foreign subsidiaries can be large for multinationals'},
    ]
  },
  steps:[
    {n:'Step 1',title:'Determine Functional Currency',para:'Para 9-12',detail:'The FUNCTIONAL CURRENCY is the currency of the primary economic environment in which the entity operates — usually where it generates and spends most of its cash. An Indian IT company billing in USD but paying employees in INR: functional currency analysis required (likely INR since most costs are INR). An Indian subsidiary of a US multinational with USD billing, USD costs, USD financing: functional currency may be USD.'},
    {n:'Step 2',title:'Classify as Monetary or Non-Monetary',para:'Para 8',detail:'MONETARY ITEMS (must be retranslated every Balance Sheet date): Cash, bank balances, trade receivables, trade payables, loans, debentures, accruals. NON-MONETARY ITEMS (translated at historical rate, not retranslated): PPE, intangibles, inventories (at cost), goodwill, prepaid expenses, equity investments at cost.'},
    {n:'Step 3',title:'Apply Translation Rules and Route Exchange Differences',para:'Para 20-28',detail:'Transaction date: record at spot rate. Balance Sheet date: monetary items retranslated at closing rate. Exchange difference goes to P&L (for operational items) or deferred in OCI (for Net Investment Hedges or foreign operations).'},
  ],
  disclosures:[],
  auditRisks:[
    {risk:'Functional currency determination — is INR appropriate?',level:'Medium',proc:'Especially relevant for subsidiaries of foreign parents. Review the primary indicators: currency of primary market, currency of payroll, currency of financing.'},
  ],
  followUps:['How to account for a USD loan in INR books?','What is the Foreign Currency Translation Reserve (FCTR)?'],
},

'38':{id:'Ind AS 38',title:'Intangible Assets',color:'#0891b2',bg:'#f0f9ff',complexity:'Medium',
  keywords:['intangible','software','brand','goodwill','patent','trademark','copyright','research','development','r&d','capitalisation','amortisation','customer list','technology'],
  keyParas:['Para 18-67','Para 72-87','Para 88-110'],
  financialImpact:{
    balanceSheet:[
      {section:'Non-Current Assets',item:'Intangible Assets',treatment:'Capitalised only if: (1) Identifiable (separable or arises from contractual rights), (2) Control (company can restrict others\' access to benefits), (3) Future economic benefits, (4) Cost reliably measurable. Research costs = ALWAYS EXPENSE. Development costs = CAPITALISE only when all 6 criteria under Para 57 are met.',movement:'Increases assets; amortised over useful life'},
    ],
    pandl:[
      {item:'Research and Development Expense',treatment:'All research costs → P&L immediately. Development costs before meeting all criteria → P&L. Once all 6 criteria met → CAPITALISE as intangible asset.',direction:'R&D heavy companies will have significant P&L expenses in early stages'},
      {item:'Amortisation',treatment:'Finite-life intangibles: amortised over useful life (straight-line unless usage pattern better). Indefinite-life intangibles (e.g., a perpetual brand): NOT amortised but tested for impairment ANNUALLY.',direction:'Annual P&L charge over amortisation period'},
    ],
    ratioImpact:[{ratio:'Asset Intensity',direction:'Increases',reason:'For software/tech companies, capitalised development costs significantly increase asset base'}]
  },
  steps:[
    {n:'Step 1',title:'Research vs Development Phase',para:'Para 54-67',detail:'RESEARCH PHASE (seeking new knowledge, evaluating alternatives): ALL costs expensed to P&L. No exceptions. DEVELOPMENT PHASE (applying research to a plan for production): CAN capitalise ONLY when ALL six criteria are met: (1) Technical feasibility of completing the asset, (2) Intention to complete and use/sell, (3) Ability to use or sell, (4) Probability of generating future economic benefits, (5) Availability of resources to complete, (6) Ability to reliably measure the expenditure.'},
    {n:'Step 2',title:'Internally Generated Intangibles — Strict Rules',para:'Para 48-67',detail:'Internally generated BRANDS, mastheads, publishing titles, customer lists → NEVER capitalised (cannot distinguish from developing the business as a whole). Only costs incurred AFTER the Development Phase criteria are all met → capitalise.'},
    {n:'Step 3',title:'Amortisation — Useful Life Assessment',para:'Para 88-110',detail:'Finite life: amortise from date available for use. The amortisation method should reflect consumption of economic benefits. Indefinite life (e.g., a brand with no legal or commercial expiry): do NOT amortise — test for impairment annually (Ind AS 36).'},
  ],
  disclosures:[],
  auditRisks:[
    {risk:'Capitalisation of development costs — are criteria genuinely met?',level:'High',proc:'Challenge management\'s assertion that all 6 criteria are met. Particularly: technical feasibility (is the product technically achievable?) and economic benefits (what is the revenue pipeline/market evidence?). Companies may over-capitalise to inflate assets and reduce P&L charges.'},
  ],
  followUps:['How to distinguish research from development?','What happens when a project moves between research and development phases?'],
},

'2':{id:'Ind AS 2',title:'Inventories',color:'#65a30d',bg:'#f7fee7',complexity:'Low',
  keywords:['inventory','stock','raw material','wip','work in progress','finished goods','nrv','net realisable value','costing','fifo','weighted average','write-down','write-off inventory','stock write-off','closing stock','opening stock','cost of goods sold','cogs','cost of inventory','inventory valuation','inventory write'],
  keyParas:['Para 10-22','Para 28-33','Para 34-40'],
  financialImpact:{
    balanceSheet:[
      {section:'Current Assets',item:'Inventories',treatment:'Measured at LOWER of COST and Net Realisable Value (NRV). Cost includes purchase price + import duties + freight + conversion costs. NRV = Estimated selling price − estimated costs to complete − estimated selling costs. If NRV \u003C Cost → WRITE DOWN to NRV (loss in P&L).',movement:'Written down if market prices fall below cost'},
    ],
    pandl:[
      {item:'Cost of Goods Sold / Cost of Materials Consumed',treatment:'When inventory is sold, its carrying amount is recognised as an expense (cost of goods sold) in the period the related revenue is recognised.',direction:'Major P&L expense for manufacturing/trading companies'},
      {item:'Inventory Write-Down Loss',treatment:'When NRV \u003C Cost: difference is recognised as a loss in P&L in the period the decline occurs. If NRV recovers subsequently: reversal allowed up to the original write-down amount.',direction:'One-time P&L charge when NRV falls below cost'},
    ],
    ratioImpact:[{ratio:'Gross Margin',direction:'Affected by method',reason:'FIFO vs Weighted Average gives different COGS in periods of price inflation/deflation'}]
  },
  steps:[
    {n:'Step 1',title:'Determine Cost — What Goes Into Inventory?',para:'Para 10-22',detail:'INCLUDE: Purchase price (net of trade discounts) + import duties + non-refundable taxes (not GST input credit) + freight inward + direct conversion costs (for manufactured inventory: direct labour + variable overheads + allocated fixed overheads at normal capacity). EXCLUDE: Abnormal waste, storage costs (unless necessary before production), administrative overheads not related to bringing inventory to current location/condition, selling costs, exchange rate losses (generally).'},
    {n:'Step 2',title:'Cost Formula — FIFO or Weighted Average',para:'Para 25-27',detail:'ONLY TWO methods allowed under Ind AS 2: (1) First-In-First-Out (FIFO) — assumes oldest items sold first. In rising prices, FIFO gives lower COGS and higher closing inventory. (2) Weighted Average Cost — blends cost over the period. LIFO (Last-In-First-Out) is NOT permitted under Ind AS.'},
    {n:'Step 3',title:'Test for NRV — Write-Down if Required',para:'Para 28-33',detail:'Every Balance Sheet date: estimate selling price for each item/category. Deduct estimated completion costs and selling costs. If NRV \u003C Cost → WRITE DOWN. The write-down is an expense in P&L. Reversal (up to original cost) allowed in subsequent periods if NRV recovers.'},
  ],
  disclosures:[],
  auditRisks:[
    {risk:'NRV below cost — are write-downs complete?',level:'High',proc:'Compare inventory cost to post-year-end selling prices for slow-moving or obsolete items. Review aged inventory listing. For raw materials: check whether finished goods can be sold above full cost.'},
  ],
  followUps:['What is Net Realisable Value?','Is LIFO allowed under Ind AS?','How to handle abnormal losses in inventory costing?'],
},

'40':{id:'Ind AS 40',title:'Investment Property',color:'#0369a1',bg:'#f0f9ff',complexity:'Medium',
  keywords:['investment property','commercial property','rental income','property for rent','property investment','office building rent','property held for appreciation','land held','leased out property','property leased to third party'],
  keyParas:['Para 7-15','Para 16-19','Para 30-56','Para 69-79'],
  financialImpact:{
    balanceSheet:[
      {section:'Non-Current Assets',item:'Investment Property',treatment:'COST MODEL ONLY under Ind AS 40 (IFRS allows Fair Value Model — India carved out). Shown at cost less accumulated depreciation less accumulated impairment. However, Fair Value must be DISCLOSED in the Notes (even though not used for measurement).',movement:'Increases by additions; reduces by depreciation'},
    ],
    pandl:[
      {item:'Rental Income',treatment:'Recognised on a straight-line basis over the lease term (unless another systematic basis is more appropriate). Even if lease payments are uneven, recognise evenly unless escalation clause is index-linked.',direction:'Revenue line in P&L — Ind AS 115 applies to the lease payment pattern'},
      {item:'Depreciation',treatment:'Same as PPE (Ind AS 16 rules apply). Cost model: depreciated over useful life. Residual value, useful life, and method assessed annually.',direction:'Annual expense reducing asset value'},
    ],
    ratioImpact:[
      {ratio:'Assets',direction:'Increase',reason:'Investment property shown at cost (not fair value) — may significantly understate economic value'},
      {ratio:'Rental Yield / Return',direction:'Measurable',reason:'Analysts use disclosed fair value to calculate true rental yield'},
    ]
  },
  steps:[
    {n:'Step 1',title:'Investment Property vs PPE vs Inventory?',para:'Para 7-15',detail:'INVESTMENT PROPERTY: Held to earn rental income OR for capital appreciation (or both) — NOT for use in operations. Examples: Office building rented to third parties, land held for long-term capital appreciation. PPE (Ind AS 16): Used IN the company\'s own operations (owner-occupied). INVENTORY (Ind AS 2): Property held for sale in ordinary course of business (developer\'s stock). MIXED USE: Split between Investment Property and PPE if portions are significant and can be sold separately.'},
    {n:'Step 2',title:'Initial and Subsequent Measurement',para:'Para 20-29',detail:'INITIAL: At COST (same as PPE — includes all directly attributable acquisition costs, stamp duty, registration, legal fees). SUBSEQUENT: COST MODEL ONLY in India. Depreciate over useful life (same as PPE component accounting). Test for impairment (Ind AS 36). Disclose FAIR VALUE in Notes (required even if not used for measurement — engage a valuer annually or at least when needed).'},
    {n:'Step 3',title:'Transfer Between Categories',para:'Para 57-65',detail:'If owner-occupied property becomes rented out → transfer from PPE to Investment Property (carry at existing carrying amount). If Investment Property is developed for sale → transfer to Inventories (carry at existing carrying amount at date of change). Transfers do NOT result in gain or loss on the transfer date.'},
  ],
  disclosures:[],
  auditRisks:[
    {risk:'Classification — owner-occupied vs investment property',level:'Medium',proc:'Review usage of each property. For mixed-use properties, is the split appropriate? Companies may misclassify to avoid impairment testing (investment property fair value disclosed but not recognised; PPE impairment test required if indicators exist).'},
  ],
  followUps:['Can Investment Property be measured at Fair Value in India?','How is rental income recognised?','What is mixed-use property?'],
},

'33':{id:'Ind AS 33',title:'Earnings Per Share',color:'#166534',bg:'#f0fdf4',complexity:'Low',
  keywords:['eps','earnings per share','diluted eps','basic eps','dilution','esop','warrant','convertible','profit per share'],
  keyParas:['Para 10-14','Para 26-48','Para 66-73'],
  financialImpact:{
    balanceSheet:[],
    pandl:[
      {item:'Basic EPS',treatment:'Profit attributable to ordinary shareholders ÷ Weighted Average Number of Shares (WANS). No Balance Sheet impact — this is a disclosure calculation only, shown on the FACE of the P&L statement.',direction:'Disclosure on P&L face — no accounting entry'},
      {item:'Diluted EPS',treatment:'Adjusted for the effect of all potential dilutive ordinary shares: ESOPs (treasury stock method), convertible instruments (if-converted method), warrants. Always ≤ Basic EPS.',direction:'Also disclosed on P&L face'},
    ],
    ratioImpact:[
      {ratio:'EPS',direction:'Dilution from ESOPs/Convertibles',reason:'Diluted EPS is lower than Basic EPS when dilutive potential shares exist'},
    ]
  },
  steps:[
    {n:'Step 1',title:'Calculate Basic EPS Numerator',para:'Para 10-14',detail:'Start with Profit or Loss for the period. Deduct: Preference dividends (cumulative preference dividends — whether or not declared; non-cumulative — only if declared). Add back: Nothing unusual. Result = Profit attributable to ordinary equity holders.'},
    {n:'Step 2',title:'Calculate Weighted Average Shares (Denominator)',para:'Para 19-24',detail:'Weight shares by the proportion of the year they were outstanding. Share issuances during year: from the date of issue. Bonus issues: retroactively for ALL periods shown (as if always outstanding). Share buybacks: removed from date of purchase. ESOPs/options: included when vested and exercised (for basic EPS).'},
    {n:'Step 3',title:'Calculate Diluted EPS — Treasury Stock Method for Options',para:'Para 26-48',detail:'For ESOPs: assume options exercised at beginning of period. Proceeds from exercise (exercise price × options) assumed used to buy back shares at AVERAGE MARKET PRICE. Incremental dilutive shares = options exercised − shares bought back. Add these to denominator. Adjust numerator for: add back interest on convertibles (net of tax) if including those shares.'},
  ],
  disclosures:[],
  auditRisks:[
    {risk:'WANS calculation — are share movements correctly weighted?',level:'Medium',proc:'Test the WANS calculation against share register. Verify ESOPs are included from exercise date (basic) and from grant date using TSM (diluted). Bonus issues must be retroactively applied.'},
  ],
  followUps:['How does the Treasury Stock Method work?','What is the impact of a bonus issue on EPS?'],
},

'1':{id:'Ind AS 1',title:'Presentation of Financial Statements',color:'#374151',bg:'#F9FAFB',complexity:'Low',
  keywords:['presentation','financial statements','balance sheet','profit loss','comprehensive income','oci','going concern','materiality','comparative','prior year','reclassification','restatement','schedule iii'],
  keyParas:['Para 15-35','Para 36-46','Para 54-80','Para 81-105'],
  financialImpact:{balanceSheet:[],pandl:[],ratioImpact:[]},
  steps:[
    {n:'Step 1',title:'Mandatory Financial Statements — Complete Set',para:'Para 10',detail:'Under Ind AS 1, every company must present: (1) Balance Sheet (as at the year-end date), (2) Statement of Profit and Loss (P&L + OCI combined), (3) Statement of Changes in Equity (SOCIE), (4) Statement of Cash Flows (Ind AS 7), (5) Notes including accounting policies. Comparatives (prior year) for every figure are MANDATORY.'},
    {n:'Step 2',title:'Current vs Non-Current Classification',para:'Para 60-76',detail:'Assets: Current if realised within 12 months or operating cycle, OR held primarily for trading, OR cash/cash equivalent. Non-Current: all others. Liabilities: Current if settled within 12 months or operating cycle, OR held primarily for trading, OR no right to defer settlement. Loans with covenant breaches: classified as Current (cannot defer settlement) UNLESS breach cured by Balance Sheet date AND creditor agrees not to demand repayment for ≥12 months post BS date.'},
    {n:'Step 3',title:'OCI — Reclassification (Recycling) Rules',para:'Para 82-96',detail:'OCI items that WILL be reclassified to P&L in future (when conditions are met): FCTR (foreign currency translation reserve), effective portion of cash flow hedges, FVOCI debt instrument gains/losses. OCI items that will NEVER be reclassified to P&L: actuarial gains/losses on defined benefit plans (Ind AS 19), gains/losses on equity instruments designated as FVOCI (Ind AS 109).'},
  ],
  disclosures:[],
  auditRisks:[
    {risk:'Incorrect current vs non-current classification',level:'Medium',proc:'Review loan agreements for covenant compliance. Identify any covenant breaches at Balance Sheet date. Ensure short-term portions of long-term debt are reclassified to current liabilities.'},
  ],
  followUps:['What are OCI items that are never reclassified to P&L?','What is the Schedule III format for Indian companies?'],
},

'8':{id:'Ind AS 8',title:'Accounting Policies, Changes in Estimates & Errors',color:'#6d28d9',bg:'#f5f3ff',complexity:'Low',
  keywords:['accounting policy','change in policy','estimate','useful life change','prior period','error','restatement','retrospective','prospective','correction'],
  keyParas:['Para 7-31','Para 32-40','Para 41-53'],
  financialImpact:{balanceSheet:[],pandl:[],ratioImpact:[]},
  steps:[
    {n:'Step 1',title:'Change in Accounting Policy → RETROSPECTIVE',para:'Para 19-31',detail:'A change in accounting policy (e.g., from FIFO to Weighted Average inventory costing) must be applied RETROSPECTIVELY: adjust opening equity of earliest period presented; restate all comparative figures. The prior year numbers in the current year\'s financial statements will be DIFFERENT from what was published last year. EXCEPTION: If it is impracticable to determine period-specific effects, apply from the earliest practicable date.'},
    {n:'Step 2',title:'Change in Accounting Estimate → PROSPECTIVE',para:'Para 32-40',detail:'Change in estimate (e.g., extending useful life of machinery from 10 to 15 years because it is in better condition than expected) → PROSPECTIVE: affects only current year and future years. No restatement of prior periods. The remaining carrying value is now depreciated over the revised remaining life.'},
    {n:'Step 3',title:'Correction of Prior Period Error → RETROSPECTIVE RESTATEMENT',para:'Para 41-53',detail:'Material errors in prior periods → restate comparative figures and adjust opening equity. Three balance sheets are presented when opening balance sheet of the earliest comparative period is restated (current year, prior year restated, and opening of prior year). Immaterial errors can be recognised in current period.'},
  ],
  disclosures:[],
  auditRisks:[
    {risk:'Is a change in estimate being disguised as a change in policy (or vice versa)?',level:'High',proc:'The treatment is fundamentally different. Challenge management\'s classification. A change in estimate is NEVER retrospective; a change in policy IS. Management may prefer to call something a "change in estimate" to avoid restating comparatives.'},
  ],
  followUps:['How to distinguish a change in policy from a change in estimate?'],
},

'23':{id:'Ind AS 23',title:'Borrowing Costs',color:'#b45309',bg:'#fffbeb',complexity:'Low',
  keywords:['borrowing cost','interest capitalisation','qualifying asset','cwip','capital work in progress','construction loan','project loan','interest during construction'],
  keyParas:['Para 8-14','Para 22-25'],
  financialImpact:{
    balanceSheet:[
      {section:'Non-Current Assets',item:'Capital Work in Progress / PPE',treatment:'Borrowing costs directly attributable to a qualifying asset are ADDED to the cost of that asset (capitalised) during the construction/development period. This INCREASES asset value rather than flowing to P&L as an expense.',movement:'Increases asset cost; starts depreciating once asset is ready for use'},
    ],
    pandl:[
      {item:'Finance Cost REDUCED',treatment:'Borrowing costs that qualify for capitalisation are REMOVED from Finance Cost in P&L and instead added to the asset cost. Once the asset is ready for use, CEASE capitalisation — all subsequent borrowing costs go to P&L.',direction:'Lower finance cost during construction; higher depreciation after commissioning'},
    ],
    ratioImpact:[
      {ratio:'EBITDA (during construction)',direction:'No impact',reason:'Capitalised borrowing costs affect asset cost, not P&L — no EBITDA impact during construction'},
      {ratio:'Interest Coverage',direction:'↑ IMPROVES during construction',reason:'Capitalised costs not in P&L finance charge'},
    ]
  },
  steps:[
    {n:'Step 1',title:'What is a Qualifying Asset?',para:'Para 5',detail:'An asset that necessarily takes a SUBSTANTIAL PERIOD of time to get ready for its intended use or sale. Examples: Factory, power plant, large commercial building under construction, specialised equipment requiring lengthy setup. NOT qualifying: Assets ready for use when acquired (off-the-shelf purchases), inventory produced in large quantities (typically), short-cycle items.'},
    {n:'Step 2',title:'Which Borrowing Costs to Capitalise?',para:'Para 8-14',detail:'SPECIFIC BORROWING (loan taken specifically for this project): Capitalise actual borrowing costs incurred minus any investment income from temporarily investing unused funds. GENERAL BORROWING (using general funds for the qualifying asset): Capitalise = Average expenditure on qualifying asset × Weighted Average Cost of general borrowings. BUT: Capitalisation cannot EXCEED total borrowing costs incurred in the period.'},
    {n:'Step 3',title:'When to Start and Stop Capitalising',para:'Para 17-25',detail:'START: When (1) expenditure is being incurred on the asset, AND (2) borrowing costs are being incurred, AND (3) activities to prepare the asset are in progress. SUSPEND: During extended periods when active development is interrupted (do not capitalise during strike or force majeure). STOP: When substantially all activities necessary to prepare the qualifying asset are complete.'},
  ],

'102':{id:'Ind AS 102',title:'Share-Based Payments (ESOP)',color:'#be185d',bg:'#fdf2f8',complexity:'High',
  keywords:['esop','share based payment','stock option','vesting','grant','exercise price','employee stock option','phantom','sar','stock appreciation right'],
  keyParas:['Para 10-15','Para 26-29','Para 30-31','Para 44-49'],
  financialImpact:{
    balanceSheet:[
      {section:'Equity',item:'Share Options Outstanding / Employee Compensation Reserve',treatment:'As ESOP expense is recognised over the vesting period, an equal credit is made to a separate equity reserve ("Share Options Outstanding"). On exercise, this is reclassified to Share Capital + Securities Premium.',movement:'Builds up over vesting period; transferred on exercise/expiry'},
    ],
    pandl:[
      {item:'Employee Share-Based Compensation Expense',treatment:'Grant-date fair value of options (from Black-Scholes or binomial model) divided over vesting period. Recognised as employee cost in P&L over the vesting period, regardless of whether options are exercised.',direction:'P&L expense over vesting period — non-cash, but real economic cost'},
    ],
    ratioImpact:[
      {ratio:'EBITDA',direction:'↓ DECREASES',reason:'ESOP expense is an operating expense (employee cost) — reduces EBITDA. Many tech companies \'adjust\' for this in non-GAAP metrics.'},
      {ratio:'Diluted EPS',direction:'↓ DECREASES',reason:'Potential shares from ESOPs are dilutive (Treasury Stock Method) — reduces denominator of Diluted EPS'},
    ]
  },
  steps:[
    {n:'Step 1',title:'Measure at Grant-Date Fair Value',para:'Para 10-15',detail:'Use Black-Scholes model or binomial model to estimate OPTION FAIR VALUE at grant date. Key inputs: share price at grant date, exercise price, expected volatility (from historical data), expected term (typically less than the contractual term), risk-free rate (G-sec of matching tenure), expected dividends. This fair value is FIXED at grant date and never changes (even if share price changes later).'},
    {n:'Step 2',title:'Recognise Expense Over Vesting Period',para:'Para 26-29',detail:'Total expense = Grant-date FV × Number of options expected to vest. Spread over the vesting period. Each year: Estimate the number expected to vest (adjust for expected forfeitures). Total cumulative expense = FV × vested options estimate × % of vesting period elapsed. Annual P&L expense = This year\'s cumulative − last year\'s cumulative.'},
    {n:'Step 3',title:'Exercise / Lapse — Final Entries',para:'Para 20-25',detail:'On EXERCISE: Transfer from "Share Options Outstanding" to "Share Capital" + "Securities Premium" (exercise price received + compensation reserve related to those options). On LAPSE / FORFEITURE: Transfer "Share Options Outstanding" to Retained Earnings (equity-to-equity transfer, no P&L). Past expense already recognised is NOT reversed.'},
  ],
  disclosures:[],
  auditRisks:[
    {risk:'Black-Scholes inputs — are volatility and expected life reasonable?',level:'High',proc:'Challenge expected volatility (based on actual historical price volatility for same period as expected life). Expected life should be less than maximum contractual term based on exercise patterns. Lower volatility → lower FV → lower expense.'},
  ],
  followUps:['How does modification of an ESOP (like repricing) change the accounting?','What is the tax impact of ESOPs under Ind AS 12?'],
},

'113':{id:'Ind AS 113',title:'Fair Value Measurement',color:'#0891b2',bg:'#f0f9ff',complexity:'Medium',
  keywords:['fair value','level 1','level 2','level 3','hierarchy','valuation','market value','observable','unobservable','dcf','mark to market'],
  keyParas:['Para 9-20','Para 72-90'],
  financialImpact:{balanceSheet:[],pandl:[],ratioImpact:[]},
  steps:[
    {n:'Step 1',title:'The Fair Value Definition',para:'Para 9',detail:'Fair Value = The price that would be received to SELL an asset or paid to TRANSFER a liability in an orderly transaction between market participants at the measurement date. Key: it is an EXIT PRICE (what you get when selling), not an entry price (what you pay when buying). It assumes an orderly transaction (not a distressed sale) between knowledgeable, willing market participants.'},
    {n:'Step 2',title:'The 3-Level Hierarchy',para:'Para 72-90',detail:'Level 1 (MOST RELIABLE): Quoted prices in active markets for IDENTICAL assets/liabilities. Example: Listed equity shares on BSE/NSE — the market price IS the fair value. Level 2: Observable inputs other than Level 1 — similar assets in active markets, identical assets in inactive markets, interest rates, yield curves, credit spreads. Example: Corporate bond priced using observable yield curve + credit spread. Level 3 (LEAST RELIABLE): Unobservable inputs — based on management\'s own assumptions about what market participants would use. Example: DCF valuation of an unlisted company using projected cash flows, discount rate assumptions.'},
    {n:'Step 3',title:'Highest and Best Use',para:'Para 27-30',detail:'For non-financial assets: fair value assumes the asset is used in its HIGHEST AND BEST USE — the use that maximises value, which must be physically possible, legally permissible, and financially feasible. Example: A building currently used as a factory but which could be converted to residential apartments — fair value might be based on residential use if that maximises value.'},
  ],
  disclosures:[],
  auditRisks:[
    {risk:'Level 3 fair values — DCF assumptions supportable?',level:'High',proc:'Challenge discount rate (WACC), terminal growth rate, revenue projections. Perform sensitivity analysis. Engage an independent valuation expert for material Level 3 items.'},
  ],
  followUps:['What is the difference between fair value and market value?','How to determine if a market is "active"?'],
},

'103':{id:'Ind AS 103',title:'Business Combinations (Acquisitions)',color:'#be185d',bg:'#fdf2f8',complexity:'High',
  keywords:['acquisition','business combination','merger','amalgamation','goodwill','ppa','purchase price allocation','acquiree','acquirer','contingent consideration','bargain purchase','step acquisition','control','non-controlling interest','nci','takeover','buyout'],
  keyParas:['Para 4-18','Para 18-20','Para 32-40','Para 59','B63-B64'],
  financialImpact:{
    balanceSheet:[
      {section:'Non-Current Assets',item:'Goodwill',treatment:'Goodwill = Purchase Consideration + Fair Value of NCI + Previously held equity FV − Fair Value of Net Identifiable Assets. NEVER amortised under Ind AS 103. Tested annually for impairment (Ind AS 36). Can only go DOWN, never up post-acquisition.',movement:'Major asset for acquisitive companies; impaired when growth expectations not met'},
      {section:'Non-Current Assets',item:'Identifiable Intangible Assets (PPA)',treatment:'Separately identified in Purchase Price Allocation: customer relationships, brand, technology, non-compete agreements, order backlog — each at fair value. These WERE NOT on the acquiree\'s books (internally generated). Now ON the consolidated Balance Sheet at FV.',movement:'Amortised over estimated useful lives (typically 5-20 years)'},
      {section:'Liabilities',item:'Contingent Consideration',treatment:'If acquisition agreement includes earn-out/contingent payments (e.g., ₹20 crore payable if target achieves ₹100 crore revenue next year): recognised at FAIR VALUE on acquisition date as a liability (or equity). SUBSEQUENT changes: if financial liability → FV changes go to P&L (NOT to goodwill). If equity → no remeasurement.',movement:'Post-acquisition FV changes hit P&L (for liability classification)'},
    ],
    pandl:[
      {item:'Acquisition Costs → EXPENSED',treatment:'All legal, advisory, due diligence, and professional fees related to the acquisition are EXPENSED in P&L immediately. They are NOT part of the purchase price. This differs from old AS 14 where some costs could be adjusted against purchase price.',direction:'One-time P&L charge in year of acquisition'},
      {item:'Amortisation of PPA Intangibles',treatment:'Customer relationships, technology, etc. identified in PPA are amortised over their useful lives. This creates an ongoing P&L charge post-acquisition that REDUCES the target\'s profitability as reflected in consolidated accounts.',direction:'Ongoing expense post-acquisition — can be substantial'},
    ],
    ratioImpact:[
      {ratio:'EPS / Profitability',direction:'↓ DECREASES',reason:'PPA amortisation charges + acquisition expenses reduce profitability post-acquisition'},
      {ratio:'Goodwill as % of Assets',direction:'Key metric',reason:'High goodwill concentration indicates risk of impairment; analysts monitor closely'},
    ]
  },
  steps:[
    {n:'Step 1',title:'Identify the Acquirer',para:'Para 6',detail:'The acquirer is the entity that obtains CONTROL. Usually the entity transferring cash/shares. In mergers-of-equals or reverse mergers, the legal acquirer may not be the accounting acquirer — assess by looking at which entity\'s shareholders end up controlling the combined entity, which management team runs the combined entity, and relative size (but size alone is not determinative).'},
    {n:'Step 2',title:'Determine Acquisition Date',para:'Para 8-9',detail:'The date on which control is actually obtained — usually the closing date when money/shares transfer and all regulatory approvals (CCI, SEBI, NCLT as applicable) are obtained. ALL fair value measurements are as of THIS DATE.'},
    {n:'Step 3',title:'Purchase Price Allocation (PPA) — Fair Value All Net Assets',para:'Para 18-20',detail:'Identify and fair-value ALL identifiable assets and liabilities of the acquiree, INCLUDING intangibles never on their books (customer relationships, brand, technology, non-compete agreements, order backlog). Each is separately valued by specialists (using Relief-from-Royalty for brands, MPEEM for customer relationships, DCF for technology). The residual (Purchase Price + FV of NCI − FV of Net Assets identified) = Goodwill.'},
    {n:'Step 4',title:'Non-Controlling Interest (NCI)',para:'Para 19',detail:'If less than 100% is acquired, NCI can be measured at: (1) FAIR VALUE (Full Goodwill Method) — NCI at market value → higher goodwill. (2) PROPORTIONATE SHARE of net assets (Partial Goodwill Method) — NCI at its % of FV of net assets → lower goodwill. Choice is made deal-by-deal.'},
  ],
  disclosures:[
    {head:'Acquisition Disclosure (Para 59)',body:'Name of acquiree, acquisition date, % acquired, reasons for acquisition, qualitative description of factors comprising goodwill (synergies, assembled workforce, market positioning). FV of consideration, breakdown by components.'},
    {head:'PPA Disclosures',body:'Fair values assigned to each class of assets and liabilities. Identifiable intangibles separately disclosed with useful life and valuation method. Provisional PPA (when finalised within measurement period of 12 months).'},
  ],
  auditRisks:[
    {risk:'PPA completeness — are all intangibles identified?',level:'High',proc:'Systematically review the acquiree\'s business for every possible intangible: is there a customer list? Recurring contracts? Proprietary technology? A known brand? Non-compete agreements? Incomplete PPA inflates goodwill (which is never amortised) vs intangibles (which are amortised).'},
    {risk:'Fair values in PPA — are valuations reasonable?',level:'High',proc:'Independently assess key assumptions in valuation reports (discount rates, customer attrition rates, royalty rates). Engage specialists for material intangibles. The valuation date must be the acquisition date.'},
    {risk:'Contingent consideration classification — liability vs equity',level:'Medium',proc:'Review acquisition agreement. If payable in cash → financial liability (FVTPL, P&L changes). If payable in a fixed number of shares → equity (no remeasurement). Classification significantly affects post-acquisition earnings.'},
  ],
  followUps:['What intangibles must be separately recognised in a PPA?','How is contingent consideration treated post-acquisition?','NCI at fair value vs proportionate — which is better?','How is goodwill impairment tested and recognised?'],
},

/* ════════════════════════════════════════════
   ANALYSIS ENGINE — MASSIVELY IMPROVED MATCHING
   ════════════════════════════════════════════ */
function identifyStandards(text){
  const lower=text.toLowerCase();
  let scores={};
  for(const[k,s]of Object.entries(STDS)){
    let score=0;
    for(const kw of s.keywords){
      if(lower.includes(kw))score+=kw.split(' ').length; // multi-word keywords score higher
    }
    scores[k]=score;
  }

  // EXPLICIT OVERRIDE RULES — prevent wrong standards
  // Building purchase without lease words → PPE, not Ind AS 116
  const hasLease=lower.includes('lease') || lower.includes('rent') || lower.includes('monthly payment')
    || lower.includes('lessee') || lower.includes('rou asset') || lower.includes('per month');
  const hasBuildingPurchase=lower.includes('buy') || lower.includes('bought') || lower.includes('purchase')
    || lower.includes('acquiring building') || lower.includes('acquiring property') || lower.includes('outright');

  if(hasBuildingPurchase && !hasLease){
    // Boost PPE significantly; reduce 116
    scores['16']=(scores['16']||0)+8;
    scores['116']=0;
    scores['102']=0; // No ESOP relevance for building purchase
  }
  if(hasBuildingPurchase && hasLease){
    // Both PPE and Ind AS 116 are relevant
    scores['16']=(scores['16']||0)+5;
    scores['116']=(scores['116']||0)+5;
    scores['102']=0;
  }

  // ESOP should only appear for actual ESOP/share-based contexts
  if(scores['102']>0 && !lower.includes('esop') && !lower.includes('option') && !lower.includes('vesting') && !lower.includes('stock') && !lower.includes('share-based') && !lower.includes('grant')){
    scores['102']=0;
  }

  // Revenue → 115 boost for sales/contract contexts
  const hasSale = lower.includes('sold') || lower.includes('sale') || lower.includes('sell')
    || lower.includes('revenue') || lower.includes('deliver') || lower.includes('invoice')
    || lower.includes('dispatch') || lower.includes('customer') || lower.includes('debtor')
    || lower.includes('income') || lower.includes('turnover') || lower.includes('goods worth')
    || lower.includes('goods sold') || lower.includes('sold goods');
  const hasReturn = lower.includes('return') || lower.includes('credit note')
    || lower.includes('refund') || lower.includes('rebate');
  const hasSaasSubscription = lower.includes('saas') || lower.includes('subscription')
    || lower.includes('service contract') || lower.includes('revenue from');

  if(hasSale){
    scores['115']=(scores['115']||0)+6;
  }
  if(hasSaasSubscription){
    scores['115']=(scores['115']||0)+4;
  }
  if(hasReturn && hasSale){
    // Sales return → definitely Ind AS 115 territory
    scores['115']=(scores['115']||0)+5;
    // Also possibly Ind AS 37 for provisions if return rate estimation needed
  }
  // If query is about selling/revenue, Ind AS 2 should only appear if inventory-specific terms present
  const hasInventorySpecific = lower.includes('inventory') || lower.includes('stock')
    || lower.includes('nrv') || lower.includes('fifo') || lower.includes('weighted average')
    || lower.includes('write-down') || lower.includes('raw material') || lower.includes('closing stock');
  if(hasSale && !hasInventorySpecific){
    // Pure revenue transaction — reduce Ind AS 2 score since it's about the sale, not the inventory valuation
    scores['2']=(scores['2']||0)-3;
  }

  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]).filter(([,s])=>s>0);
  if(!sorted.length)return[];
  const top=sorted[0][1];
  return sorted.filter(([,s])=>s>=Math.max(1,top*0.3)).slice(0,4).map(([k])=>STDS[k]);
}

        <tbody>

            <td style={{color:r.cr?'var(--green)':r.dr?'#1a56db':'var(--ink3)'}}>{r.acc}</td>
            <td className="dr">{r.dr}</td>
            <td className="cr">{r.cr}</td>
          </tr>)}
          <tr><td colSpan="3" className="narr">{m.narr}</td></tr>
        </tbody>
      </table>
    </div>)}
  </div>;
}

function DisclosureView({std}){
  if(!std.disclosures||!std.disclosures.length)return null;
  return <div className="analysis-block">
    <div className="analysis-label">📋 Key Disclosures Required</div>
    {std.disclosures.map((d,i)=><div key={i} className="d-block">
      <div className="d-block-title">{d.head}</div>
      <div style={{color:'var(--ink2)',fontSize:12.5,lineHeight:1.7}}>{d.body}</div>
    </div>)}
  </div>;
}

function AuditView({std}){
  if(!std.auditRisks||!std.auditRisks.length)return null;
  return <div className="analysis-block">
    <div className="analysis-label">🔍 Audit Risk Areas & Procedures</div>
    <div style={{background:'var(--red-lt)',borderRadius:6,padding:'8px 12px',fontSize:12,color:'#7f1d1d',marginBottom:10,border:'1px solid #FECACA'}}>
      High-risk areas where errors, misstatements, or management bias are most likely to occur.
    </div>
    {std.auditRisks.map((r,i)=><div key={i} style={{border:'1px solid var(--border)',borderRadius:7,padding:'10px 12px',marginBottom:8,background:r.level==='High'?'#fff':'var(--bg)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6,gap:12}}>
        <div style={{fontWeight:600,fontSize:13,color:'var(--ink)',flex:1}}>{r.risk}</div>
        <Badge l={r.level}/>
      </div>
      <div style={{fontSize:12,color:'var(--ink2)',lineHeight:1.65}}><span style={{fontWeight:600,color:'var(--teal)'}}>Procedure: </span>{r.proc}</div>
    </div>)}
  </div>;
}

function MemoView({std,transaction,ctx}){
  return <div className="analysis-block">
    <div className="analysis-label">📄 Audit / Working Paper Memo</div>
    <div style={{border:'1px solid var(--border)',borderRadius:8,padding:16,background:'var(--bg)',fontFamily:'var(--mono)',fontSize:12,lineHeight:1.8}}>
      <div style={{fontWeight:700,color:'var(--navy)',marginBottom:4,fontFamily:'var(--font)',fontSize:13}}>ACCOUNTING MEMO — DRAFT FOR REVIEW</div>
      <div style={{color:'var(--ink3)',marginBottom:12,fontSize:11.5,fontFamily:'var(--font)'}}>Auto-generated by Ind AS Guide | Not a substitute for professional judgement</div>
      <div className="memo-block">
        <div className="memo-label">SUBJECT</div>
        <div>{std.id} — {std.title} | Treatment Assessment</div>
      </div>
      <div className="memo-block">
        <div className="memo-label">TRANSACTION / SCENARIO</div>
        <div style={{fontFamily:'var(--font)'}}>{transaction.slice(0,200)}{transaction.length>200?'...':''}</div>
      </div>
      <div className="memo-block">
        <div className="memo-label">APPLICABLE STANDARD</div>
        <div>{std.id}: {std.title}. Key paragraphs: {std.keyParas.join(', ')}. Complexity: {std.complexity}.</div>
      </div>
      <div className="memo-block">
        <div className="memo-label">RISK ASSESSMENT</div>
        <div>
          {(std.auditRisks||[]).filter(r=>r.level==='High').length} High | {(std.auditRisks||[]).filter(r=>r.level==='Medium').length} Medium risk areas identified.
          {' '}High-risk area: {(std.auditRisks||[])[0]?.risk||'See Risk section.'}</div>
      </div>
      <div className="memo-block">
        <div className="memo-label">KEY JUDGEMENTS</div>
        <div>{std.steps.slice(0,2).map(s=>s.title).join('; ')}</div>
      </div>
      <div style={{background:'var(--orange-lt)',borderRadius:5,padding:'8px 12px',fontSize:11,color:'#92400e',marginTop:8,border:'1px solid #FED7AA',fontFamily:'var(--font)'}}>
        ⚠️ Disclaimer: This is an AI-generated drafting aid for accounting guidance only. Review, customise, and obtain professional sign-off before use. Facts not verified.
      </div>
    </div>
  </div>;
}

function ResultsView({stds,transaction,ctx}){
  const [tab,setTab]=useState('overview');
  const tabs=[
    {id:'overview',label:'📊 Analysis & B/S Impact'},
    {id:'steps',label:'🪜 Step-by-Step'},
    {id:'journals',label:'📒 Journal Entries'},
    {id:'disclosures',label:'📋 Disclosures'},
    {id:'audit',label:'🔍 Audit Risks'},
    {id:'memo',label:'📄 WP Memo'},
  ];
  const primary=stds[0];
  return <div className="std-result" style={{marginTop:16,borderTop:`3px solid ${primary.color}`}}>
    {/* Multi-standard strip */}
    {stds.length>1&&<div style={{display:'flex',gap:8,padding:'10px 16px',background:'var(--bg)',borderBottom:'1px solid var(--border)',flexWrap:'wrap',alignItems:'center'}}>
      <span style={{fontSize:11,color:'var(--ink3)',fontWeight:600}}>MATCHED STANDARDS:</span>
      {stds.map((s,i)=><span key={i} style={{background:s.bg,color:s.color,padding:'2px 10px',borderRadius:3,fontSize:11,fontWeight:700,border:`1px solid ${s.color}33`}}>{s.id}{i===0?' (Primary)':''}</span>)}
      <span style={{fontSize:11,color:'var(--ink4)',marginLeft:'auto'}}>Tab through for full analysis</span>
    </div>}

    {/* Standard header */}
    <div className="std-result-header">
      <div style={{display:'flex',alignItems:'center',gap:10,flex:1}}>
        <span className="std-id-badge" style={{background:primary.bg,color:primary.color,border:`1px solid ${primary.color}33`}}>{primary.id}</span>
        <div>
          <div style={{fontWeight:700,fontSize:15,color:'var(--ink)'}}>{primary.title}</div>
          <div style={{fontSize:11.5,color:'var(--ink3)',marginTop:1}}>Primary applicable standard for your transaction</div>
        </div>
      </div>
      <Badge l={primary.complexity}/>
    </div>

    {/* Quick insight box */}
    <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',background:'var(--bg)'}}>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        {primary.keyParas.map((p,i)=><span key={i} style={{background:'var(--white)',border:'1px solid var(--border2)',color:'var(--ink2)',fontSize:11,padding:'2px 8px',borderRadius:3,fontFamily:'var(--mono)'}}>{p}</span>)}
      </div>
    </div>

    {/* Tabs */}
    <div className="tab-bar" style={{overflowX:'auto'}}>
      {tabs.map(t=><button key={t.id} className={`tab-btn ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
    </div>

    {/* Tab content */}
    <div>
      {tab==='overview'&&<FinancialImpactView std={primary}/>}
      {tab==='steps'&&<StepsView std={primary}/>}
      {tab==='journals'&&<JournalView std={primary}/>}
      {tab==='disclosures'&&<DisclosureView std={primary}/>}
      {tab==='audit'&&<AuditView std={primary}/>}
      {tab==='memo'&&<MemoView std={primary} transaction={transaction} ctx={ctx}/>}

      {/* Secondary standards quick view */}
      {stds.length>1&&tab==='overview'&&<div style={{padding:'12px 16px',borderTop:'1px solid var(--border)',background:'var(--bg)'}}>
        <div style={{fontSize:11,fontWeight:700,color:'var(--ink4)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>Also Consider</div>
        {stds.slice(1).map((s,i)=><div key={i} style={{padding:'8px 0',borderBottom:i<stds.length-2?'1px solid var(--border)':undefined}}>
          <span style={{background:s.bg,color:s.color,padding:'2px 8px',borderRadius:3,fontSize:11,fontWeight:700,marginRight:8}}>{s.id}</span>
          <span style={{fontSize:12.5,color:'var(--ink2)',fontWeight:500}}>{s.title}</span>
          <span style={{fontSize:11,color:'var(--ink4)',marginLeft:8}}>{s.steps[0]?.title}</span>
        </div>)}
      </div>}
    </div>

    {/* Footer */}
    <div style={{padding:'10px 16px',borderTop:'1px solid var(--border)',background:'var(--bg)',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
      <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
        {(primary.followUps||[]).slice(0,3).map((q,i)=><span key={i} className="follow-chip" onClick={()=>setTx(q)}>{q}</span>)}
      </div>
      <div style={{display:'flex',gap:6}}>
        <button onClick={()=>exportToHTML(stds,transaction)} style={{background:'linear-gradient(135deg,#0077CC,#2D6BE4)',color:'#fff',border:'none',borderRadius:5,padding:'7px 13px',fontSize:11,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:4,fontFamily:'var(--font)'}}>⬇ HTML</button>
        <button onClick={()=>exportToPDF(stds,transaction)} style={{background:'linear-gradient(135deg,#1A8A4A,#2E7D32)',color:'#fff',border:'none',borderRadius:5,padding:'7px 13px',fontSize:11,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:4,fontFamily:'var(--font)'}}>🖨 PDF</button>
      </div>
    </div>
  </div>;
}

function CaseStudyView({cs}){
  return <div style={{width:'100%'}}>
    <div style={{marginBottom:12}}>
      <div style={{fontSize:16,fontWeight:700,color:'var(--ink)',marginBottom:4}}>{cs.title}</div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
        {cs.stds.map(s=>{const st=Object.values(STDS).find(x=>x.id===s);return <span key={s} style={{background:st?st.bg:'var(--bg)',color:st?st.color:'var(--ink3)',fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:3,border:`1px solid ${st?st.color+'33':'var(--border)'}`}}>{s}</span>;})}
      </div>
    </div>
    <div className="insight-box" style={{whiteSpace:'pre-line',marginBottom:16,fontFamily:'var(--mono)',fontSize:12.5}}>{cs.scenario}</div>

    {cs.analysis.map((a,i)=><div key={i} style={{marginBottom:12}}>
      <div style={{fontSize:12,fontWeight:700,color:'var(--ink)',marginBottom:6,padding:'4px 8px',background:'var(--bg)',borderRadius:4,border:'1px solid var(--border)'}}>{a.heading}</div>
      <table className="fs-table">
        <tbody>
          {a.entries.map((e,j)=><tr key={j} style={e.highlight?{background:'var(--teal-lt)'}:{}}>
            <td style={{fontFamily:'var(--mono)',fontSize:12}}>{e.label}</td>
            <td style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--ink3)'}}>{e.val}</td>
            <td style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:e.highlight?700:500,color:e.highlight?'var(--teal-dk)':'var(--ink)'}}>{e.inr}</td>
          </tr>)}
        </tbody>
      </table>
    </div>)}

    {cs.journals.map((j,i)=><div key={i} style={{marginBottom:12}}>
      <div style={{fontSize:12,fontWeight:700,color:'var(--ink)',marginBottom:6,borderBottom:'1px solid var(--border)',paddingBottom:4}}>{j.title}</div>
      <table className="je-table">
        <thead><tr><th>Account</th><th>Dr.</th><th>Cr.</th></tr></thead>
        <tbody>
          {j.rows.map((r,k)=><tr key={k}>
            <td style={{color:r.cr?'var(--green)':r.dr?'#1a56db':'var(--ink2)'}}>{r.acc}</td>
            <td className="dr">{r.dr}</td>
            <td className="cr">{r.cr}</td>
          </tr>)}
          <tr><td colSpan="3" className="narr">{j.narr}</td></tr>
        </tbody>
      </table>
    </div>)}
  </div>;
}

function Sidebar({mode,setMode,onCase}){
  return <div className="sidebar">
    <div className="sidebar-section">
      <div className="sidebar-label">Analysis Mode</div>
      {[{id:'quick',icon:'⚡',label:'Quick Treatment'},{id:'cases',icon:'📚',label:'Case Studies'}].map(m=>
        <button key={m.id} className={`nav-btn ${mode===m.id?'active':''}`} onClick={()=>setMode(m.id)}>
          <span className="nav-icon">{m.icon}</span><span>{m.label}</span>
        </button>
      )}
    </div>

    <div className="sidebar-section" style={{flex:1,overflowY:'auto'}}>
      <div className="sidebar-label">Quick Examples</div>
      {QUICK_EXAMPLES.map((ex,i)=><div key={i} className="example-item" onClick={()=>onCase(ex.t)}>{ex.l}</div>)}
    </div>
  </div>;
}

/* ════════════════════════════════════════════
   MAIN APP
   ════════════════════════════════════════════ */
function App(){
  const [mode,setMode]=useState('quick');
  const [tx,setTx]=useState('');
  const [results,setResults]=useState(null);
  const [loading,setLoading]=useState(false);
  const [noMatch,setNoMatch]=useState(false);
  const [ctx]=useState({});
  const [selCase,setSelCase]=useState(null);
  const [count,setCount]=useState(0);
  const [inputTab,setInputTab]=useState('text');
  const fileRef=useRef();

  const doAnalyze=()=>{
    if(!tx.trim())return;
    setLoading(true);setResults(null);setNoMatch(false);
    setTimeout(()=>{
      const matched=identifyStandards(tx);
      if(matched.length){setResults(matched);setCount(c=>c+1);}else setNoMatch(true);
      setLoading(false);
    },1000);
  };

  const handleFile=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setTx(ev.target.result.slice(0,2000));r.readAsText(f);};

  return <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
    {/* HEADER */}
    <div className="app-header no-print" style={{padding:'0 20px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0,height:54}}>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <div className="logo-mark">IAS</div>
        <div>
          <div className="brand-title">Ind AS Accounting Guide & Audit Assistant</div>
          <div className="brand-sub">21 Standards · Journal Entries · Case Studies · Audit Risks</div>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        {count>0&&<span className="header-pill">{count} analyses</span>}
        <div style={{width:1,height:20,background:'rgba(255,255,255,.2)'}}/>
        <span style={{fontSize:12,fontWeight:700,color:'rgba(255,255,255,.85)'}}>Vipin Nair</span>
      </div>
    </div>

    <div style={{display:'flex',flex:1,overflow:'hidden',minWidth:0}}>
      <Sidebar mode={mode} setMode={setMode} onCase={t=>{setTx(t);setMode('quick');setResults(null);setNoMatch(false);}}/>

      <div className="main-scroll" style={{minWidth:0}}>
        {/* CASE STUDIES */}
        {mode==='cases'&&<div style={{width:'100%'}}>
          <div style={{fontSize:17,fontWeight:700,color:'var(--ink)',marginBottom:4}}>📚 Multi-Standard Case Studies</div>
          <div style={{fontSize:13,color:'var(--ink3)',marginBottom:16}}>Real-world Indian scenarios with complete calculations, journal entries, and cross-standard analysis.</div>
          {!selCase?<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:12}}>
            {CASES.map(cs=><div key={cs.id} className="cs-card" onClick={()=>setSelCase(cs)}>
              <div style={{fontSize:13.5,fontWeight:700,color:'var(--ink)',marginBottom:5}}>{cs.title}</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:7}}>
                {cs.stds.map(s=>{const st=Object.values(STDS).find(x=>x.id===s);return <span key={s} style={{background:st?st.bg:'var(--bg)',color:st?st.color:'var(--ink3)',fontSize:10,fontWeight:700,padding:'1px 6px',borderRadius:3}}>{s}</span>;})}
              </div>
              <div style={{fontSize:12,color:'var(--ink3)',lineHeight:1.55}}>{cs.short}</div>
            </div>)}
          </div>:<div>
            <div style={{display:'flex',gap:8,marginBottom:14}}>
      <button className="btn-secondary" onClick={()=>setSelCase(null)}>← Back to cases</button>
    </div>
            <CaseStudyView cs={selCase}/>
          </div>}
        </div>}

        {/* QUICK / AUDIT */}
        {mode==='quick'&&<div style={{width:'100%'}}>
          <div className="card" style={{padding:18,marginBottom:0,borderTop:'3px solid var(--teal)'}}>
            <div style={{fontSize:14,fontWeight:700,color:'var(--ink)',marginBottom:4}}>
              '⚡ Describe your accounting transaction'
            </div>
            <div style={{fontSize:12,color:'var(--ink3)',marginBottom:12}}>
              Be specific: include amounts, duration, nature of asset/service, and parties involved. The more detail, the better the analysis.
            </div>

            <div style={{display:'flex',gap:0,marginBottom:12,background:'var(--bg)',borderRadius:6,padding:3,width:'fit-content'}}>
              {[{id:'text',l:'✏️ Type Transaction'},{id:'file',l:'📎 Upload Document'}].map(t=>
                <button key={t.id} onClick={()=>setInputTab(t.id)} style={{padding:'5px 14px',border:'none',borderRadius:5,fontSize:12,fontWeight:500,cursor:'pointer',background:inputTab===t.id?'#fff':'transparent',color:inputTab===t.id?'var(--ink)':'var(--ink3)',boxShadow:inputTab===t.id?'0 1px 3px rgba(0,0,0,.1)':'none',fontFamily:'var(--font)',transition:'all .12s'}}>{t.l}</button>)}
            </div>

            {inputTab==='text'?
              <textarea value={tx} onChange={e=>setTx(e.target.value)} rows={5} className="query-box"
                placeholder="Example: 'We are purchasing a commercial building for ₹1,00,000 lakh. OR: Customer paid ₹50 lakh upfront for a 3-year SaaS license. OR: Company signed 5-year office lease at ₹2 lakh/month with 9% IBR...'"
                onKeyDown={e=>{if(e.key==='Enter'&&e.ctrlKey)doAnalyze();}}/>
              :<div><div className="upload-zone" onClick={()=>fileRef.current.click()}>
                <div style={{fontSize:28,marginBottom:6}}>📎</div>
                <div style={{fontSize:13,fontWeight:600,color:'var(--ink)'}}>Upload Contract or Document</div>
                <div style={{fontSize:11,color:'var(--ink3)'}}>Text files (.txt, .csv, .md) — extracts first 2,000 characters</div>
              </div><input ref={fileRef} type="file" accept=".txt,.csv,.md" style={{display:'none'}} onChange={handleFile}/></div>}

            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:12,flexWrap:'wrap',gap:8}}>
              <div style={{fontSize:11,color:'var(--ink4)'}}>
                
                {tx&&<span style={{marginLeft:10,color:'var(--ink3)'}}>Ctrl+Enter to analyse</span>}
              </div>
              <div style={{display:'flex',gap:8}}>
                <button className="btn-secondary" onClick={()=>{setTx('');setResults(null);setNoMatch(false);}}>Clear</button>
                <button className="btn-primary" onClick={doAnalyze} disabled={loading||!tx.trim()}>
                  {loading&&<Spin/>}{loading?'Analysing...':'⚡ Analyse Transaction'}
                </button>
              </div>
            </div>
          </div>

          {noMatch&&!loading&&<div className="card" style={{marginTop:16,padding:24,textAlign:'center',borderTop:'3px solid var(--orange)'}}>
            <div style={{fontSize:24,marginBottom:8}}>🔍</div>
            <div style={{fontWeight:700,color:'var(--ink)',marginBottom:6,fontSize:15}}>No standard identified</div>
            <div style={{fontSize:13,color:'var(--ink3)',marginBottom:12}}>Try more specific terms: "lease", "revenue recognition", "financial instrument", "impairment", "gratuity", "deferred tax", "business combination", "ESOP", "biological asset", "investment property".</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6,justifyContent:'center'}}>
              {['Lease of office space','Gratuity actuarial valuation','Revenue from SaaS contract','Expected credit loss on loans'].map((s,i)=><span key={i} className="follow-chip" onClick={()=>{setTx(s);doAnalyze();}}>{s}</span>)}
            </div>
          </div>}

          {results&&!loading&&<ResultsView stds={results} transaction={tx} ctx={ctx}/>}

          {!results&&!loading&&!noMatch&&<div style={{marginTop:18}}>
            <div style={{fontSize:12,fontWeight:700,color:'var(--ink4)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:10}}>All Standards — Click to load an example</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(195px,1fr))',gap:9}}>
              {Object.values(STDS).map(s=><div key={s.id} className="card" style={{padding:12,borderLeft:`4px solid ${s.color}`,cursor:'pointer',transition:'all .18s',borderRadius:8}}
                onClick={()=>setTx(s.followUps[0])}
                onMouseOver={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 4px 12px rgba(0,0,0,.1)';}}
                onMouseOut={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='';}}>
                <span style={{background:s.bg,color:s.color,fontSize:10.5,fontWeight:700,padding:'2px 7px',borderRadius:3,display:'inline-block',marginBottom:5,fontFamily:'var(--mono)'}}>{s.id}</span>
                <div style={{fontWeight:600,fontSize:12,color:'var(--ink)',marginBottom:3,lineHeight:1.3}}>{s.title}</div>
                <Badge l={s.complexity}/>
              </div>)}
            </div>
          </div>}
        </div>}
      </div>
    </div>

    {/* FOOTER */}
    <div className="no-print app-footer" style={{padding:'6px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
      <span>Ind AS Accounting Guide & Audit Assistant — <strong style={{color:'rgba(255,255,255,.75)'}}>Vipin Nair</strong></span>
      <span>21 Standards · 9 Case Studies · Powered by Ind AS Deep Dive Reference</span>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
