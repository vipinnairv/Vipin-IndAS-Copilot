.je-table th{background:#f1f5f9;padding:8px 12px;text-align:left;color:#475569;font-weight:600;font-size:12px;border:1px solid #e2e8f0}

.para-ref{background:#eff6ff;color:#1d4ed8;font-size:11px;padding:2px 7px;border-radius:4px;margin:2px;display:inline-block}
.std-badge{display:inline-block;padding:4px 12px;border-radius:6px;font-size:13px;font-weight:700}
.select-s{background:#fff;border:1px solid #e2e8f0;border-radius:7px;padding:7px 10px;font-size:13px;width:100%;color:#334155;cursor:pointer}
.select-s:focus{outline:none;border-color:#3b82f6}
.upload-zone{border:2px dashed #cbd5e1;border-radius:10px;padding:28px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover{border-color:#3b82f6;background:#eff6ff}
.memo-s{border-left:3px solid #3b82f6;padding-left:14px;margin-bottom:18px}

.follow-chip:hover{background:#dbeafe}
.context-note{background:#fefce8;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;font-size:12px;color:#854d0e;margin-bottom:12px}
.ctx-tag{background:#e0e7ff;color:#3730a3;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;margin-right:4px}

@media print{.no-print{display:none!important}.sidebar{display:none!important}.app-header{display:none!important}body{background:#fff}.card{box-shadow:none;border:1px solid #e2e8f0}}

'115':{id:'Ind AS 115',title:'Revenue from Contracts with Customers',color:'#1d4ed8',bg:'#eff6ff',complexity:'High',

  entityNotes:{'Bank / NBFC':'Fee income from loan origination must be assessed under Ind AS 115 vs. Ind AS 109 (EIR method). Processing fees integral to the loan are part of EIR, not Ind AS 115.','Listed / Public Company':'SEBI LODR requires quarterly disclosure of revenue disaggregation. Ensure consistency between investor presentations and Ind AS 115 disclosures.'},
  steps:[

    {n:'Step 2',title:'Identify Performance Obligations',para:'Para 22-30',detail:'A good/service is distinct if: (a) customer can benefit from it alone or with readily available resources, AND (b) promise is separately identifiable from other promises in the contract.'},

    {n:'Step 5',title:'Recognize Revenue',para:'Para 31-38',detail:'Over time if: (a) customer simultaneously receives and consumes benefits, (b) entity creates/enhances customer-controlled asset, (c) no alternative use + right to payment. Otherwise, point in time.'},

    {risk:'Variable consideration constraint',level:'High',proc:'Review probability assessment; assess historical experience; check subsequent events.'},

  followUps:['How to account for contract modifications?','What if there is a significant financing component?','How to determine SSP when no observable price exists?','When should variable consideration be constrained?'],

    {risk:'Lease term assessment',level:'Medium',proc:'Review renewal assessment; inspect post-BS renewals; assess business plans.'},

'109':{id:'Ind AS 109',title:'Financial Instruments',color:'#0f766e',bg:'#f0fdfa',complexity:'High',
  keywords:['financial instrument','financial instruments','ind as 109','loan','bond','investment','derivative','hedge','hedging','forward','swap','option','ecl','expected credit loss','impairment','fvtpl','fvoci','amortized cost','amortised cost','fair value','receivable','borrowing','debenture','ncd','preference share','equity instrument','debt instrument','credit loss','stage','provision matrix','classification of financial','banking instrument','financial asset','financial liability'],

    {head:'ECL Disclosures (Para 35H-35N)',body:'Loss allowance roll-forward, gross carrying by credit quality, inputs/assumptions, staging, write-offs.'},
    {head:'Risk Disclosures (Para 31-42)',body:'Credit, liquidity, and market risk (interest rate, currency, price). Quantitative and qualitative.'},
  ],
  auditRisks:[

    {risk:'ECL model assumptions',level:'High',proc:'Challenge PD, LGD, EAD; test provision matrix; assess staging criteria and macro overlays.'},

  ],
  followUps:['How to apply the SPPI test?','How to build a provision matrix?','What triggers Stage 2?','How does hedge accounting work?'],

'1':{id:'Ind AS 1',title:'Presentation of Financial Statements',color:'#0c4a6e',bg:'#e0f2fe',complexity:'Low',
  keywords:['financial statements','balance sheet','profit and loss','cash flow','equity','presentation','going concern','accrual','materiality','offsetting','comparative','notes','schedule iii','other comprehensive income','oci','total comprehensive income','disclosure','accounting policy','ifrs','ind as'],
  keyParas:['Para 15-24','Para 25-35','Para 38-44','Para 54-80','Para 81-105'],
  industryNotes:{},entityNotes:{},
  steps:[
    {n:'Step 1',title:'Complete Set of Financials',para:'Para 10',detail:'Every company must prepare: (1) Balance Sheet — snapshot of what the company owns and owes on a specific date. (2) Statement of Profit & Loss — shows income and expenses during the year. (3) Statement of Changes in Equity — tracks how shareholders\' equity moved. (4) Statement of Cash Flows (Ind AS 7) — actual cash movements in Operating, Investing, and Financing activities. (5) Notes — detailed explanations and disclosures behind every line item.'},
    {n:'Step 2',title:'Going Concern',para:'Para 25-26',detail:'Prepare accounts assuming the business will continue for at least 12 more months. If there is serious doubt (e.g., inability to pay debts, loss of major contract), this must be disclosed clearly. If the business is being wound up, switch to liquidation basis, not historical cost.'},
    {n:'Step 3',title:'Accrual Basis & Materiality',para:'Para 27-31',detail:'Record income and expenses when they HAPPEN, not when cash moves. Example: revenue earned in March 2026 is recorded in March even if cash comes in April. Materiality: only disclose items that could influence a reasonable investor\'s decision. Small items can be aggregated.'},
    {n:'Step 4',title:'No Offsetting (Netting)',para:'Para 32-35',detail:'Do NOT net off assets against liabilities or income against expenses. Example: ₹500 crore receivable and ₹300 crore payable must both appear separately — you cannot just show ₹200 crore net. Exception: where another Ind AS specifically permits netting (e.g., Ind AS 12 for deferred tax).'},
    {n:'Step 5',title:'Comparative Information',para:'Para 38-44',detail:'Every number must show BOTH current year and prior year side by side. If a policy changes or an error is corrected (Ind AS 8), prior year comparatives must be restated. In that case, THREE balance sheets are presented: current year, prior year restated, and the opening of the prior year.'},
  ],
  disclosures:[
    {head:'Accounting Policies (Para 117-124)',body:'Disclose all significant accounting policies used: basis of preparation (Ind AS), measurement bases (historical cost, fair value), and specific policies for revenue, depreciation, inventories, financial instruments, etc.'},
    {head:'Sources of Estimation Uncertainty (Para 125)',body:'Disclose areas where estimates have a significant risk of material adjustment in the next year — e.g., useful life of PPE, ECL assumptions, warranty provisions, actuarial assumptions.'},
    {head:'Capital Disclosures (Para 134-136)',body:'Objectives, policies, and processes for managing capital; whether capital requirements are complied with.'},
  ],
  auditRisks:[
    {risk:'Going concern assessment',level:'High',proc:'Review cash flow projections, loan covenants, post-balance-sheet events, and management plans.'},
    {risk:'Completeness and accuracy of disclosures',level:'Medium',proc:'Trace all Ind AS requirements to actual disclosures; verify numerical cross-references.'},
    {risk:'Correct classification (current vs non-current)',level:'Medium',proc:'Review operating cycle definition; verify loan covenants for reclassification triggers.'},
  ],
  followUps:['What goes in Other Comprehensive Income vs P&L?','How to classify assets as current vs non-current?','When must a third balance sheet be presented?'],
},
'2':{id:'Ind AS 2',title:'Inventories',color:'#166534',bg:'#dcfce7',complexity:'Low',
  keywords:['inventory','inventories','stock','raw material','work in progress','wip','finished goods','nrv','net realisable value','cost','fifo','weighted average','lower of cost','valuation','warehouse','goods','trading','merchandise'],
  keyParas:['Para 9-22','Para 28-33','Para 34-36','Para 36-39'],
  industryNotes:{'Manufacturing':'Componentize inventory into raw materials, WIP, and finished goods. Overhead absorption into cost of production is mandatory for WIP and finished goods.','Retail & Consumer':'NRV for seasonal/fashion goods must use post-year-end selling prices. Provisions for slow-moving or obsolete stock are common.'},
  entityNotes:{},
  steps:[
    {n:'Step 1',title:'What is Inventory?',para:'Para 6',detail:'Inventory is assets held for sale in the ordinary course of business (finished goods), in the process of production (WIP), or as materials/supplies to be used in production (raw materials). Does NOT include: biological assets (Ind AS 41), financial instruments, WIP from construction contracts (Ind AS 115).'},
    {n:'Step 2',title:'Measure at LOWER of Cost and NRV',para:'Para 9',detail:'The golden rule: inventory is ALWAYS valued at whichever is lower — its cost or what you can realistically sell it for (NRV). This prevents overvaluing inventory. If the selling price has fallen below cost, you must write down to NRV. The write-down is an expense in P&L.'},
    {n:'Step 3',title:'What is Cost?',para:'Para 10-18',detail:'Cost = Purchase Price + Import Duties + Non-refundable taxes + Freight inward + Directly attributable costs MINUS trade discounts, rebates, and refundable taxes (like GST credit). For manufactured goods, cost includes raw materials + conversion costs (direct labour + manufacturing overheads).'},
    {n:'Step 4',title:'Cost Formula — FIFO or Weighted Average',para:'Para 25-27',detail:'FIFO (First-In, First-Out): Assumes oldest inventory is sold first. In rising prices, FIFO gives lower cost of goods sold and higher profit. Weighted Average: Average cost of all units. Both are allowed. LIFO (Last-In, First-Out) is BANNED under Ind AS.'},
    {n:'Step 5',title:'NRV — Net Realisable Value',para:'Para 28-33',detail:'NRV = Estimated selling price MINUS estimated costs to complete and sell. Example: If a car part cost ₹50,000 but can only be sold for ₹42,000 after finishing touches of ₹5,000, then NRV = ₹37,000 < Cost ₹50,000. Write down to ₹37,000. Review NRV at EVERY balance sheet date.'},
  ],
  disclosures:[
    {head:'Inventory Disclosures (Para 36)',body:'Carrying amount by category (raw materials, WIP, finished goods); amount of write-downs to NRV in P&L; amount of write-down reversals; carrying amount pledged as security.'},
    {head:'Cost Formula Used',body:'Disclose whether FIFO or Weighted Average is used. Same formula must be used for all inventories of similar nature and use.'},
  ],
  auditRisks:[
    {risk:'NRV below cost — provision adequacy',level:'High',proc:'Compare cost to post-year-end selling prices; review ageing report; inspect slow-moving stock lists.'},
    {risk:'Overhead absorption rate',level:'Medium',proc:'Test overhead absorption methodology; verify actual vs budgeted production volumes.'},
    {risk:'Cut-off at year end',level:'High',proc:'Test goods-in-transit; verify last-in/first-out records; agree to despatch notes.'},
  ],
  followUps:['When can a write-down to NRV be reversed?','How to treat overhead in cost of production?','FIFO vs Weighted Average — which is better?'],
},
'8':{id:'Ind AS 8',title:'Accounting Policies, Changes & Errors',color:'#7c3aed',bg:'#f5f3ff',complexity:'Medium',
  keywords:['accounting policy','change in policy','change in estimate','prior period error','retrospective','prospective','restatement','correction','useful life','depreciation method','slm','wdv','fundamental error','material prior period'],
  keyParas:['Para 7-12','Para 14-22','Para 32-40','Para 41-53'],
  industryNotes:{},entityNotes:{},
  steps:[
    {n:'Step 1',title:'What is an Accounting Policy?',para:'Para 5',detail:'Accounting policies are the specific rules and methods a company uses consistently. Examples: how to value inventory (FIFO vs weighted average), how to depreciate PPE (SLM vs WDV), when to recognize revenue. Once chosen, policies must be applied consistently year after year.'},
    {n:'Step 2',title:'Change in Policy → RETROSPECTIVE',para:'Para 14-22',detail:'A policy can change ONLY if (a) required by a new Ind AS, or (b) the new policy gives more relevant and reliable information. When changed: go back and restate ALL prior year figures as if the new policy ALWAYS existed. Adjust the opening retained earnings for the earliest period shown. Present three balance sheets if the change is at the start of the comparative period.'},
    {n:'Step 3',title:'Change in Estimate → PROSPECTIVE',para:'Para 32-40',detail:'Estimates are updated when new information arrives. Examples: changing useful life of a machine from 10 years to 15 years, or revising ECL assumptions. Treatment: affect ONLY the current year and future years. Do NOT restate past years — the old estimate was correct given information available at that time.'},
    {n:'Step 4',title:'Prior Period Errors → RETROSPECTIVE RESTATEMENT',para:'Para 41-53',detail:'Errors are mistakes in past financials — mathematical mistakes, misapplication of policies, fraud, or overlooked facts. Treatment: restate comparative prior year figures as if the error never happened. Adjust opening equity for errors before the earliest period shown. This is NOT a P&L charge in the current year.'},
    {n:'Step 5',title:'How to Distinguish the Three',para:'Para 5-8',detail:'Key question: "Was the original treatment wrong?" If YES (based on info available then) → ERROR (retrospective restatement). If original was right but standard changed → POLICY CHANGE (retrospective). If original was right but new information arrived → ESTIMATE CHANGE (prospective only). Test: depreciation rate change = policy; useful life change = estimate; missed depreciation entirely = error.'},
  ],
  disclosures:[
    {head:'Policy Change Disclosures (Para 28-29)',body:'Nature; reason why new policy is more relevant; amount of adjustment for current period and each prior period presented; cumulative effect on equity.'},
    {head:'Estimate Change (Para 39)',body:'Nature and amount of change affecting current period; amount expected to affect future periods if practicable to estimate.'},
    {head:'Error Correction (Para 49)',body:'Nature; amount of correction per line item; cumulative effect on equity at start of earliest comparative period.'},
  ],
  auditRisks:[
    {risk:'Mis-classification of error as estimate change',level:'High',proc:'Analyse whether information was available at the time; determine nature of misstatement.'},
    {risk:'Retrospective restatement completeness',level:'Medium',proc:'Verify all comparative periods and opening balances adjusted correctly.'},
    {risk:'Impracticability claims',level:'Medium',proc:'Challenge management\'s claim that retrospective application is impracticable.'},
  ],
  followUps:['How do I know if something is a policy change or estimate change?','What is the "impracticability" exemption?','How are voluntary policy changes disclosed?'],
},
'10':{id:'Ind AS 10',title:'Events After the Reporting Period',color:'#0369a1',bg:'#e0f2fe',complexity:'Low',
  keywords:['events after','subsequent events','post balance sheet','adjusting event','non-adjusting event','dividend declared','going concern post','material event','after reporting period'],
  keyParas:['Para 3-7','Para 8-13','Para 14-17'],
  industryNotes:{},entityNotes:{},
  steps:[
    {n:'Step 1',title:'What are Events After the Reporting Period?',para:'Para 2',detail:'These are significant events that occur AFTER the balance sheet date (e.g., 31 March 2026) but BEFORE the financial statements are authorised for issue (typically 2-4 months later when the board approves them). The question is: do these events change what we report, or just what we disclose?'},
    {n:'Step 2',title:'Adjusting Events — Change the Numbers',para:'Para 8-9',detail:'Adjusting events: events that provide EVIDENCE of conditions that ALREADY EXISTED at the balance sheet date. These require changing the financial statements. Examples: (a) A court case that was ongoing at year-end is settled in April for ₹50 crore — adjust the provision. (b) A customer who owed money at year-end files for bankruptcy in May — write down the receivable. (c) Discovery of fraud or errors that existed at year-end.'},
    {n:'Step 3',title:'Non-Adjusting Events — Disclose Only',para:'Para 10-11',detail:'Non-adjusting events: events that arise from conditions that did NOT exist at the balance sheet date. These do NOT change the numbers, but must be disclosed in notes if material. Examples: (a) Major fire destroying a factory in April. (b) Announcing a major acquisition in May. (c) A natural disaster after year-end. (d) A sharp fall in market prices after year-end.'},
    {n:'Step 4',title:'Dividends — Never Adjust',para:'Para 12-13',detail:'Dividends declared AFTER the balance sheet date are NEVER recognised as a liability in the current year\'s balance sheet. They are only disclosed in notes. Reason: the company had no obligation to pay at the balance sheet date — the dividend was declared later.'},
    {n:'Step 5',title:'Going Concern Post-Year-End',para:'Para 14-16',detail:'If information received after year-end indicates the company cannot continue as a going concern, completely change the basis of preparation. This overrides the going concern assumption — the financials must be prepared on a liquidation basis instead.'},
  ],
  disclosures:[
    {head:'Non-Adjusting Events (Para 20)',body:'Nature of the event; estimate of its financial effect (or statement that an estimate cannot be made).'},
    {head:'Date of Authorisation (Para 17)',body:'Must disclose the date when financial statements were authorised for issue and who gave the authorisation.'},
  ],
  auditRisks:[
    {risk:'Completeness of subsequent events review',level:'High',proc:'Review board minutes, legal letters, management representations, and news up to signing date.'},
    {risk:'Incorrect classification of event as non-adjusting',level:'High',proc:'Assess whether conditions existed at balance sheet date or arose after.'},
  ],
  followUps:['What is the difference between adjusting and non-adjusting events?','How long is the "subsequent events" period?','When should dividends be recognized as a liability?'],
},
'23':{id:'Ind AS 23',title:'Borrowing Costs',color:'#92400e',bg:'#fffbeb',complexity:'Low',
  keywords:['borrowing cost','interest capitalisation','qualifying asset','construction','capitalization','capex','finance cost','ibr','loan','interest','specific borrowing','general borrowing','suspension of capitalisation','commencement'],
  keyParas:['Para 5','Para 8-9','Para 10-15','Para 16-18','Para 19-24'],
  industryNotes:{'Real Estate & Construction':'Interest on construction loans is capitalised as part of the building cost during the construction period. Suspension rules apply during prolonged interruptions.','Infrastructure & Utilities':'Power plants and infrastructure assets are classic qualifying assets. Specific borrowings are common; general borrowing pool calculations require careful tracking.'},
  entityNotes:{},
  steps:[
    {n:'Step 1',title:'What is a Qualifying Asset?',para:'Para 5',detail:'A qualifying asset is one that NECESSARILY takes a substantial period of time to get ready for its intended use or sale. Examples: a factory under construction (takes 2 years), a power plant, a real estate development project, a ship being built. NOT qualifying: assets ready for use when purchased (standard inventory), financial assets, assets that routinely take a short time to produce.'},
    {n:'Step 2',title:'The Core Rule — Capitalise, Not Expense',para:'Para 8',detail:'Borrowing costs directly attributable to acquiring, constructing, or producing a qualifying asset MUST be capitalised as part of the cost of that asset. They are added to the asset\'s cost on the balance sheet, not charged to P&L. All other borrowing costs (on general working capital, etc.) are expensed to P&L in the period incurred.'},
    {n:'Step 3',title:'Specific vs General Borrowings',para:'Para 10-14',detail:'Specific Borrowing: If a loan is taken specifically to finance a qualifying asset, capitalise actual interest on that loan MINUS any investment income earned by temporarily investing unused loan funds. General Borrowing Pool: If the asset is financed from general borrowings, calculate the capitalization rate = weighted average interest rate on all general borrowings outstanding. Apply this rate to the average expenditure on the asset during the period.'},
    {n:'Step 4',title:'When to Start, Suspend, and Stop',para:'Para 17-25',detail:'START capitalising when: (a) expenditures on the asset are being incurred, AND (b) borrowing costs are being incurred, AND (c) construction activities have begun. SUSPEND when: active construction is interrupted for an extended period (e.g., regulatory hold, dispute, monsoon season if abnormally prolonged). STOP when: substantially all activities to prepare the asset for use are complete.'},
    {n:'Step 5',title:'Numerical Illustration',para:'Para 10-14',detail:'Example: Company builds a factory. Specific loan = ₹500 crore at 9%. Expenditure during year = ₹400 crore. Temporarily invested ₹100 crore at 6% for 3 months. Interest to capitalise = ₹400 cr × 9% = ₹36 crore MINUS investment income of ₹1.5 crore (₹100 cr × 6% × 3/12) = ₹34.5 crore. This ₹34.5 crore is added to the factory cost, not charged to P&L.'},
  ],
  disclosures:[
    {head:'Capitalisation Disclosures (Para 26)',body:'Amount of borrowing costs capitalised during the period; capitalization rate used (for general borrowings).'},
  ],
  auditRisks:[
    {risk:'Qualifying asset determination',level:'Medium',proc:'Review asset construction timeline; verify "substantial period" assessment.'},
    {risk:'Capitalization rate calculation',level:'High',proc:'Verify weighted average interest rate; trace to loan agreements; ensure investment income is deducted.'},
    {risk:'Commencement and cessation dates',level:'Medium',proc:'Agree to construction contracts, board approvals, and certificate of completion.'},
  ],
  followUps:['What if construction is partly funded by equity?','How to handle multiple specific borrowings?','Can borrowing costs be capitalised for inventory?'],
},
'33':{id:'Ind AS 33',title:'Earnings Per Share',color:'#0891b2',bg:'#ecfeff',complexity:'Low',
  keywords:['eps','earnings per share','basic eps','diluted eps','weighted average shares','esop dilution','convertible','potential ordinary shares','profit attributable','minority','preference dividend','share buyback','rights issue','ind as 33','per share','earning per share','dilution','stock option','share option','profit per share','net profit per share','antidilutive'],
  keyParas:['Para 10-17','Para 19-29','Para 30-63','Para 66-73'],
  industryNotes:{},entityNotes:{'Listed / Public Company':'EPS must be disclosed on the face of the P&L (Profit & Loss statement), not just in Notes. Basic and Diluted EPS are both mandatory for listed companies.'},
  steps:[
    {n:'Step 1',title:'What is EPS and Why Does it Matter?',para:'Para 9',detail:'EPS (Earnings Per Share) tells investors how much profit is attributable to each ordinary share. It is the denominator for the P/E ratio and is one of the most widely followed metrics. If EPS grows, the share is considered more valuable. Ind AS 33 ensures EPS is calculated consistently across all companies.'},
    {n:'Step 2',title:'Basic EPS Calculation',para:'Para 10-14',detail:'Basic EPS = (Profit attributable to ordinary equity holders) ÷ (Weighted Average Number of ordinary shares outstanding). The numerator: take total profit, subtract any preference dividends (preference shareholders get paid first before ordinary holders). The denominator: weight shares by the fraction of the year they were outstanding. Example: 10 crore shares for 9 months + 12 crore shares for 3 months = WANS of (10×9 + 12×3)/12 = 10.5 crore shares.'},
    {n:'Step 3',title:'Diluted EPS — As If Everything Converted',para:'Para 30-40',detail:'Diluted EPS assumes ALL dilutive potential ordinary shares are exercised or converted. Dilutive instruments: ESOPs (employee stock options), convertible debentures, convertible preference shares, warrants. For each dilutive instrument: (a) Add the shares that would be issued to the denominator, (b) Add back any savings to the numerator (e.g., interest saved if debt converts). If diluted EPS < basic EPS: the instrument is dilutive (include it). If diluted EPS > basic EPS: the instrument is anti-dilutive (exclude it).'},
    {n:'Step 4',title:'Special Cases — Bonus Issue, Rights Issue, Stock Split',para:'Para 19-29',detail:'Bonus Shares / Stock Splits: No cash consideration received. Treat as if shares existed from the beginning of the earliest period shown. Restate prior year EPS accordingly. Rights Issue: A blend — treat the bonus element retrospectively, and the cash consideration element prospectively from the date of issue.'},
    {n:'Step 5',title:'Presentation',para:'Para 66-73',detail:'Present Basic and Diluted EPS on the FACE of the P&L statement (not just in notes) for profit/loss from continuing operations. If there are discontinued operations, show separate EPS for them too. Present EPS even if it is negative (a loss per share).'},
  ],
  disclosures:[
    {head:'EPS Disclosures (Para 70)',body:'Numerator (profit used); denominator (WANS); per share amounts; description of transactions affecting shares after year-end.'},
    {head:'Diluted EPS (Para 70)',body:'Instruments giving rise to dilution; effect of each instrument; anti-dilutive instruments excluded.'},
  ],

'38':{id:'Ind AS 38',title:'Intangible Assets',color:'#6d28d9',bg:'#faf5ff',complexity:'Medium',

  keyParas:['Para 18-67','Para 54-67','Para 68-71','Para 72-87','Para 97-106'],
  industryNotes:{'IT & Software':'Software development costs: research-phase costs are expensed. Development costs are capitalised once technological feasibility is established (usually from start of Phase 3 or equivalent milestone). Subsequent amortisation period typically 3-5 years.','Pharmaceuticals & Healthcare':'Drug development: research costs expensed. Development costs from Phase 3 clinical trials can be capitalised if technical feasibility is probable. Ongoing impairment assessment critical if regulatory approval fails.'},
  entityNotes:{},
  steps:[
    {n:'Step 1',title:'What is an Intangible Asset?',para:'Para 8-17',detail:'An intangible asset is an identifiable, non-monetary asset WITHOUT physical substance. For example: patents (legal right to an invention), trademarks (brand name), computer software (code), customer lists, licenses (to operate in a market), franchise agreements, and acquired technology. Key requirement: it must be IDENTIFIABLE — either separable (can be sold/licensed separately) OR arising from a legal/contractual right.'},
    {n:'Step 2',title:'Recognition — 6 Conditions for Development Costs',para:'Para 57',detail:'Internally generated intangibles are the hard part. RESEARCH costs are ALWAYS expensed (Para 54). DEVELOPMENT costs can be capitalised ONLY if ALL 6 conditions are met: (1) Technical feasibility of completion, (2) Intention to complete and use/sell, (3) Ability to use or sell, (4) How will it generate future economic benefits (probable market exists), (5) Adequate resources to complete development, (6) Ability to measure expenditure reliably. ALL SIX must be satisfied — if even one is missing, expense it.'},
    {n:'Step 3',title:'Cannot Capitalise — These are Always Expensed',para:'Para 48-64',detail:'You can NEVER capitalise: (a) Internally generated brands, mastheads, customer lists (too subjective), (b) Internally generated goodwill — only acquired goodwill (Ind AS 103) can appear on the balance sheet, (c) Training costs, (d) Advertising and marketing costs, (e) Start-up and pre-opening costs of a new business.'},
    {n:'Step 4',title:'Measurement After Recognition',para:'Para 72-87',detail:'Cost Model: Carry at cost less accumulated amortisation and impairment losses (most common in India). Revaluation Model: Can revalue to fair value IF an active market exists for the specific intangible. Very rare in practice because active markets for specific intangibles rarely exist.'},
    {n:'Step 5',title:'Useful Life — Finite or Indefinite',para:'Para 88-106',detail:'Finite useful life: Amortise over useful life using a systematic method (usually straight-line). Review useful life and residual value at every year-end. Indefinite useful life: NO amortisation, but test for impairment every year AND whenever there is an indicator. An indefinite-life asset must be reviewed at every year-end to see if it still qualifies as indefinite (e.g., a brand that was forever may now have a finite life due to competition).'},
  ],
  disclosures:[

'40':{id:'Ind AS 40',title:'Investment Property',color:'#0369a1',bg:'#e0f2fe',complexity:'Low',

  industryNotes:{'Real Estate & Construction':'Investment property is a major balance sheet item. Fair value must be disclosed in notes even though cost model is used for measurement. Transfers between owner-occupied and investment property require careful assessment.','Infrastructure & Utilities':'Certain utility-owned properties leased to third parties may qualify as investment property. Distinguishing from property used in operations requires careful analysis.'},
  entityNotes:{},
  steps:[
    {n:'Step 1',title:'What is Investment Property?',para:'Para 5',detail:'Investment property is land or a building (or part of a building) held to earn RENTAL INCOME or for CAPITAL APPRECIATION (or both), rather than for: (a) use in production/supply of goods/services or administration (that would be PPE — Ind AS 16), or (b) sale in the ordinary course of business (that would be inventory — Ind AS 2). Example: A company owns a commercial building in Mumbai that it rents to tenants — this is investment property. If the company uses the same building as its own office — it is PPE.'},
    {n:'Step 2',title:'India-Specific Rule — Cost Model ONLY',para:'Para 30',detail:'IMPORTANT CARVE-OUT from IFRS: Under IFRS (IAS 40), companies can choose either the Cost Model OR the Fair Value Model for investment property. India removed the Fair Value Model option. Under Ind AS 40, investment property in India can ONLY be measured using the COST MODEL (cost less accumulated depreciation less impairment). HOWEVER, companies must still DISCLOSE the fair value in the notes.'},
    {n:'Step 3',title:'Cost Model Measurement',para:'Para 27-29',detail:'After recognition at cost, investment property is carried at: cost MINUS accumulated depreciation MINUS accumulated impairment losses. Depreciation policy (SLM typically) must be consistent. Test for impairment annually (Ind AS 36). Land is not depreciated. Apply component accounting (Ind AS 16 principles) to investment properties.'},
    {n:'Step 4',title:'Transfers In and Out of Investment Property',para:'Para 57-65',detail:'When a property changes its use, transfer it between categories. Examples: (a) Company stops using its own office and starts renting it → transfer from PPE to Investment Property. Carry at cost, no remeasurement. (b) Company starts using its own investment property → transfer from Investment Property to PPE. Carry at cost. No gain/loss on transfer because cost model is used.'},
    {n:'Step 5',title:'Disposal',para:'Para 66-73',detail:'On disposal (sale or when permanently retired), remove the investment property from the balance sheet. Calculate gain/loss = Sale Proceeds MINUS Carrying Amount (after depreciation). Gain/loss goes to P&L. Proceeds from disposing of investment property are disclosed separately in cash flow statements.'},
  ],

    {head:'Fair Value Disclosure (Mandatory — Para 79)',body:'Fair value of investment property (even though measurement uses cost model). Method and significant assumptions used. Must be based on valuation from an independent, professionally qualified valuer.'},

'113':{id:'Ind AS 113',title:'Fair Value Measurement',color:'#1d4ed8',bg:'#eff6ff',complexity:'Medium',
  keywords:['fair value','level 1','level 2','level 3','valuation','market approach','income approach','cost approach','exit price','market participants','observable inputs','unobservable inputs','fv hierarchy','dcf','mark to market','quoted price','active market'],
  keyParas:['Para 9','Para 15-20','Para 24-47','Para 61-90','Para 91-99'],
  industryNotes:{'Banking & Financial Services':'Level 3 fair values (unobservable inputs) are highest risk. ECL models, unlisted equity investments, and complex structured products require specialist valuation. Disclose sensitivity analysis for Level 3.','Manufacturing':'Investment in unlisted subsidiaries or strategic equity holdings often requires DCF-based Level 3 valuation. Key assumptions: revenue growth, EBITDA margin, discount rate (WACC).'},
  entityNotes:{},
  steps:[
    {n:'Step 1',title:'Fair Value is an EXIT Price',para:'Para 9',detail:'Fair Value = the price you would RECEIVE to sell an asset OR PAY to transfer a liability in an orderly transaction between market participants at the measurement date. Three critical points: (1) EXIT price — what you get when selling, not what you paid when buying, (2) Orderly transaction — normal market conditions, not a forced sale or distress sale, (3) Market participants — knowledgeable, willing, independent buyers/sellers.'},
    {n:'Step 2',title:'The 3-Level Hierarchy — Best to Worst',para:'Para 72-90',detail:'Level 1 (Best — Most Reliable): Quoted prices in ACTIVE markets for IDENTICAL assets. Example: Price of Reliance Industries shares on NSE at 3:30 PM. No adjustments allowed. Level 2 (Middle): Observable inputs OTHER than Level 1. Examples: interest rate curves, yield spreads, foreign exchange rates, prices of similar (not identical) assets. Level 3 (Worst — Most Judgemental): Unobservable inputs based on the entity\'s own assumptions. Examples: DCF projections for an unlisted company, assumptions about future cash flows. Always use the HIGHEST level possible.'},
    {n:'Step 3',title:'Valuation Techniques',para:'Para 61-66',detail:'Market Approach: Uses prices from transactions in identical or comparable assets/liabilities. Best for listed shares, real estate with active market comparables. Income Approach: Converts future amounts to a single present value. DCF (Discounted Cash Flow) is most common — project future free cash flows, discount at WACC. Used for business valuations, unlisted equity. Cost Approach: Reflects the amount to replace the service capacity of an asset. Used for specialised assets without observable market data.'},
    {n:'Step 4',title:'Principal Market',para:'Para 15-21',detail:'Fair value is measured from the perspective of the PRINCIPAL market (highest volume and activity for the asset). If no principal market exists, use the most advantageous market. The entity must have access to the market. Example: A company holds shares listed on both NSE and BSE — use the market where the company would normally transact (usually NSE if that has higher liquidity for that stock).'},
    {n:'Step 5',title:'Practical Application Across Standards',para:'Para 4-8',detail:'Ind AS 113 provides the HOW to measure fair value; the WHEN is specified in each individual standard. It applies across: Ind AS 109 (financial instruments at FVTPL and FVOCI), Ind AS 103 (PPA — fair value net assets at acquisition), Ind AS 40 (fair value disclosure for investment property), Ind AS 41 (biological assets at FVLCTS), Ind AS 116 (fair value of lease assets), and many more.'},
  ],
  disclosures:[
    {head:'Fair Value Hierarchy (Para 91-99)',body:'For each class of assets/liabilities: level in hierarchy; amounts transferred between levels; reconciliation of Level 3 balances (opening, gains/losses in P&L/OCI, purchases, sales, transfers).'},
    {head:'Valuation Techniques & Inputs (Para 93)',body:'Description of valuation technique and inputs used. For Level 3: quantitative information about significant unobservable inputs and sensitivity analysis.'},
  ],
  auditRisks:[
    {risk:'Level 3 valuation assumptions',level:'High',proc:'Involve valuation specialists; challenge WACC, growth rates, and terminal value assumptions; test sensitivity.'},
    {risk:'Level classification — correct hierarchy',level:'High',proc:'Verify observability of inputs; ensure Level 2 inputs are truly market-observable.'},
    {risk:'Fair value disclosure completeness',level:'Medium',proc:'Agree disclosures to underlying valuation models; verify Level 3 roll-forward.'},
  ],
  followUps:['How to value an unlisted equity investment at fair value?','What is the difference between Level 2 and Level 3?','How does highest and best use apply to non-financial assets?'],
},

const INDUSTRIES=['General / Not specified','Banking & Financial Services','Insurance','Real Estate & Construction','Manufacturing','IT & Software','Retail & Consumer','Infrastructure & Utilities','Oil & Gas','Pharmaceuticals & Healthcare','Telecom','Agriculture & Food Processing','Automobiles','Shipping & Logistics','Aviation','Hotels & Hospitality','Media & Entertainment','Education','Non-Profit / NGO'];
const ENTITY_TYPES=['Listed / Public Company','Unlisted Public Company','Private Limited Company','LLP / Partnership','Bank / NBFC','Insurance Company','Government Entity'];

/* ═══════════════════════════════════════════════════════════════════════════
   ANALYSIS ENGINE — Multi-Standard Identification
   ═══════════════════════════════════════════════════════════════════════════ */
function identifyStandards(text){
  const lower=text.toLowerCase();
  let scores={};
  for(const[k,s]of Object.entries(STDS)){scores[k]=s.keywords.filter(kw=>lower.includes(kw)).length;}
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]).filter(([,s])=>s>0);
  if(!sorted.length)return[];
  const top=sorted[0][1];
  // single keyword match is enough; use 35% of top score threshold for multi-hit queries
  return sorted.filter(([,s])=>s>=Math.max(1,top*0.35)).map(([k])=>STDS[k]);
}

function parseAmounts(text){
  const amounts=[];
  const patterns=[
    {re:/[\u20B9]\s*([\d,]+(?:\.\d+)?)\s*(crore|cr|lakh|lac|l|thousand|k|million|mn|billion)?s?\b/gi,cur:'INR'},
    {re:/(?:USD|usd|\$)\s*([\d,]+(?:\.\d+)?)\s*(million|mn|thousand|k|billion|bn)?/gi,cur:'USD'},
    {re:/(?:EUR|eur|\u20AC)\s*([\d,]+(?:\.\d+)?)\s*(million|mn|thousand|k)?/gi,cur:'EUR'},
  ];
  patterns.forEach(({re,cur})=>{let m;while((m=re.exec(text))!==null){
    let val=parseFloat(m[1].replace(/,/g,''));
    const unit=(m[2]||'').toLowerCase();
    if(unit.startsWith('cr'))val*=10000000;
    else if(unit.startsWith('l')||unit==='lac')val*=100000;
    else if(unit.startsWith('m'))val*=1000000;
    else if(unit.startsWith('b'))val*=1000000000;
    else if(unit==='k'||unit.startsWith('th'))val*=1000;
    amounts.push({val,cur,raw:m[0]});
  }});
  const pcts=[];
  let pm;const pre=/(\d+(?:\.\d+)?)\s*%/g;
  while((pm=pre.exec(text))!==null)pcts.push(parseFloat(pm[1]));
  const yrs=[];
  let ym;const yre=/(\d+)\s*[-\s]?(?:year|yr|month)/gi;
  while((ym=yre.exec(text))!==null)yrs.push(parseInt(ym[1]));
  return{amounts,pcts,yrs};
}

function fmtINR(n){if(n>=10000000)return'\u20B9'+((n/10000000).toFixed(2).replace(/\.?0+$/,''))+' Crores';if(n>=100000)return'\u20B9'+((n/100000).toFixed(2).replace(/\.?0+$/,''))+' Lakhs';return'\u20B9'+n.toLocaleString('en-IN');}

function getContextNotes(std,ctx){
  const notes=[];
  const indRule=CONTEXT_RULES.industries[ctx.industry];
  const entRule=CONTEXT_RULES.entityTypes[ctx.entityType];
  if(indRule)notes.push({type:'industry',label:ctx.industry,icon:indRule.icon,color:indRule.color,focus:indRule.focus,items:indRule.notes,auditFocus:indRule.auditFocus});
  if(entRule&&ctx.entityType!=='Listed / Public Company'||entRule)notes.push({type:'entity',label:ctx.entityType,icon:entRule?entRule.icon:'🏢',color:entRule?entRule.color:'#475569',items:entRule?entRule.notes:[],auditFocus:entRule?entRule.auditFocus:[]});
  return notes.filter(n=>n.items&&n.items.length>0);
}

function App(){
  const [mode,setMode]=useState('quick');
  const [tx,setTx]=useState('');
  const [results,setResults]=useState(null);
  const [loading,setLoading]=useState(false);
  const [noMatch,setNoMatch]=useState(false);
  const [ctx,setCtx]=useState({industry:INDUSTRIES[0],entityType:ENTITY_TYPES[0]});
  const [selCase,setSelCase]=useState(null);
  const [count,setCount]=useState(0);
  const [inputTab,setInputTab]=useState('text');
  const fileRef=useRef();

  const doAnalyze=()=>{
    if(!tx.trim())return;
    setLoading(true);setResults(null);setNoMatch(false);
    setTimeout(()=>{
      const matched=identifyStandards(tx);
      if(matched.length){setResults(matched);setCount(c=>c+1);}else setNoMatch(true);
      setLoading(false);
    },1200);
  };

  const handleFile=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setTx(ev.target.result.slice(0,1500));r.readAsText(f);};

  return <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
    {/* HEADER */}
    <div className="app-header no-print" style={{padding:'10px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',gap:14}}>
        <div><div style={{color:'#fff',fontWeight:700,fontSize:18}}>Ind AS Accounting Copilot</div><div style={{color:'#93c5fd',fontSize:11}}>From transaction to treatment in under 60 seconds</div></div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        {count>0&&<span style={{background:'rgba(255,255,255,.12)',color:'#fff',fontSize:11,padding:'3px 10px',borderRadius:20}}>{count} analyses</span>}
        <span style={{color:'#93c5fd',fontSize:12,fontWeight:600}}>Vipin Nair</span>
      </div>
    </div>

    <div style={{display:'flex',flex:1,overflow:'hidden'}}>
      <Sidebar mode={mode} setMode={setMode} ctx={ctx} setCtx={setCtx} onCase={t=>{setTx(t);setMode('quick');setResults(null);setNoMatch(false);}}/>

      <div className="main-scroll" style={{padding:24}}>
        {/* ── CASE STUDIES MODE ── */}
        {mode==='cases'&&<div style={{maxWidth:880}}>
          <div style={{fontSize:18,fontWeight:700,color:'#1e293b',marginBottom:4}}>Multi-Standard Case Studies</div>
          <div style={{fontSize:13,color:'#64748b',marginBottom:16}}>Real-world scenarios involving multiple Ind AS standards with full calculations and journal entries.</div>
          {!selCase?<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:12}}>
            {CASES.map(cs=><div key={cs.id} className="cs-card" onClick={()=>setSelCase(cs)}>
              <div style={{fontSize:14,fontWeight:600,color:'#1e293b',marginBottom:4}}>{cs.title}</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:6}}>{cs.stds.map(s=>{const st=Object.values(STDS).find(x=>x.id===s);return <span key={s} style={{background:st?st.bg:'#f1f5f9',color:st?st.color:'#475569',fontSize:10,fontWeight:600,padding:'2px 6px',borderRadius:4}}>{s}</span>;})}</div>
              <div style={{fontSize:12,color:'#64748b',lineHeight:1.5}}>{cs.short}</div>
            </div>)}
          </div>:<div>
            <button onClick={()=>setSelCase(null)} style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:8,padding:'6px 14px',fontSize:12,cursor:'pointer',marginBottom:12,color:'#475569'}}>\u2190 Back to all case studies</button>
            <CaseStudyView cs={selCase} ctx={ctx}/>
          </div>}
        </div>}

        {/* ── QUICK / AUDIT MODE ── */}
        {(mode==='quick'||mode==='audit')&&<div style={{maxWidth:880}}>
          <div className="card" style={{padding:20}}>
            <div style={{fontSize:16,fontWeight:700,color:'#1e293b',marginBottom:14}}>
              {mode==='audit'?' Describe your transaction for audit memo':'\u26A1 Describe your transaction'}
            </div>
            <div style={{display:'flex',gap:0,marginBottom:12,background:'#f1f5f9',borderRadius:8,padding:3,width:'fit-content'}}>
              {[{id:'text',l:'\u270F Type a Transaction'},{id:'file',l:'Upload Document'}].map(t=>
                <button key={t.id} onClick={()=>setInputTab(t.id)} style={{padding:'6px 14px',border:'none',borderRadius:6,fontSize:12,fontWeight:500,cursor:'pointer',background:inputTab===t.id?'#fff':'transparent',color:inputTab===t.id?'#1e293b':'#64748b',boxShadow:inputTab===t.id?'0 1px 3px rgba(0,0,0,.1)':'none'}}>{t.l}</button>)}
            </div>
            {inputTab==='text'?
              <textarea value={tx} onChange={e=>setTx(e.target.value)} rows={5} placeholder="What happened? Be as specific as possible \u2014 amounts, dates, terms, parties involved.&#10;&#10;Example: Customer paid \u20B950 lakh upfront for a 3-year SaaS license with annual support..." style={{width:'100%',border:'1px solid #e2e8f0',borderRadius:10,padding:14,fontSize:13,color:'#1e293b',lineHeight:1.6,resize:'none'}} onKeyDown={e=>{if(e.key==='Enter'&&e.ctrlKey)doAnalyze();}}/>
              :<div><div className="upload-zone" onClick={()=>fileRef.current.click()}><div style={{fontSize:28,marginBottom:6}}> </div><div style={{fontSize:14,fontWeight:600,color:'#334155'}}>Upload Contract or Document</div><div style={{fontSize:12,color:'#64748b'}}>Text files (.txt, .csv)</div></div><input ref={fileRef} type="file" accept=".txt,.csv,.md" style={{display:'none'}} onChange={handleFile}/></div>}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:12,flexWrap:'wrap',gap:8}}>
              <div style={{fontSize:11,color:'#94a3b8'}}>Context: {ctx.industry} {ctx.entityType}{tx&&<span style={{marginLeft:8,color:'#64748b'}}>Ctrl+Enter to analyse</span>}</div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>{setTx('');setResults(null);setNoMatch(false);}} style={{padding:'9px 16px',border:'1px solid #e2e8f0',borderRadius:8,background:'#fff',color:'#475569',fontSize:13,cursor:'pointer'}}>Clear</button>
                <button onClick={doAnalyze} disabled={loading||!tx.trim()} style={{padding:'9px 24px',border:'none',borderRadius:8,background:loading||!tx.trim()?'#94a3b8':'#1d4ed8',color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:8}}>
                  {loading&&<Spin/>}{loading?'Analysing...':'\u26A1 Analyse'}
                </button>
              </div>
            </div>
          </div>

          {noMatch&&!loading&&<div className="card" style={{marginTop:20,padding:24,textAlign:'center'}}>
            <div style={{fontSize:28,marginBottom:8}}></div>
            <div style={{fontWeight:600,color:'#1e293b',marginBottom:4}}>No matching standard identified</div>
            <div style={{fontSize:13,color:'#64748b',marginBottom:12}}>Try more specific accounting terms: "lease", "revenue", "financial instrument", "impairment", "employee benefits", "deferred tax", "business combination", "ESOP", "biological asset".</div>
          </div>}

          {results&&!loading&&<ResultsView stds={results} transaction={tx} ctx={ctx}/>}

          {!results&&!loading&&!noMatch&&<div style={{marginTop:24,display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:10}}>
            {Object.values(STDS).map(s=><div key={s.id} className="card" style={{padding:12,borderLeft:`3px solid ${s.color}`,cursor:'pointer'}} onClick={()=>setTx(s.followUps[0])} onMouseOver={e=>e.currentTarget.style.transform='translateY(-1px)'} onMouseOut={e=>e.currentTarget.style.transform=''}>
              <span className="std-badge" style={{background:s.bg,color:s.color,marginBottom:4,display:'inline-block',fontSize:11}}>{s.id}</span>
              <div style={{fontWeight:600,fontSize:12,color:'#1e293b',marginBottom:2}}>{s.title}</div>
              <Badge l={s.complexity}/>
            </div>)}
          </div>}
        </div>}
      </div>
    </div>

    {/* FOOTER */}
    <div className="no-print" style={{padding:'6px 24px',background:'#fff',borderTop:'1px solid #e2e8f0',display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:11,color:'#94a3b8',flexShrink:0}}>
      <span>Ind AS Accounting Copilot Built by <strong style={{color:'#1e293b'}}>Vipin Nair</strong></span>
      <span>12 Ind AS Standards 9 Case Studies {INDUSTRIES.length} Industries</span>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
