<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ind AS Accounting Guide & Audit Assistant | Vipin Nair</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#0077CC;--teal-dk:#005FA3;--teal-lt:#E8F4FF;--teal-mid:#B3D9FF;
  --blue:#2D6BE4;--blue-lt:#EEF4FF;--blue-dk:#1A4FC4;
  --orange:#E8690A;--orange-lt:#FFF1E6;
  --red:#D42B2B;--red-lt:#FFF0F0;
  --green:#1A8A4A;--green-lt:#E8F8EF;
  --purple:#6B3FA0;--purple-lt:#F3EEFF;
  --bg:#F0F4F8;--bg2:#E4EAF0;
  --white:#FFFFFF;
  --ink:#0D1B2A;--ink2:#2C3E50;--ink3:#5A6A7A;--ink4:#96A8B8;
  --border:#D6E4F0;--border2:#BDD0E4;
  --grad-header:linear-gradient(135deg,#0D1B2A 0%,#1A3A5C 60%,#0077CC 100%);
  --grad-card:linear-gradient(135deg,#0077CC,#2D6BE4);
  --font:'Inter',system-ui,sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--ink);font-size:14px;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--teal-mid);border-radius:4px}

/* HEADER */
.app-header{background:var(--grad-header);border-bottom:none;box-shadow:0 4px 20px rgba(13,27,42,.35)}
.logo-mark{width:36px;height:36px;background:linear-gradient(135deg,#00AAFF,#0077CC);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:14px;letter-spacing:-.5px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,119,204,.5)}
.brand-title{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.2px}
.brand-sub{font-size:10.5px;color:rgba(179,217,255,.85);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-top:1px}
.header-pill{background:rgba(0,170,255,.2);color:#7DD4FF;font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:20px;border:1px solid rgba(0,170,255,.35)}

/* SIDEBAR */
.sidebar{width:255px;min-width:255px;background:#fff;border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.sidebar-section{padding:14px 12px;border-bottom:1px solid var(--border)}
.sidebar-label{font-size:9.5px;font-weight:700;color:var(--teal-dk);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--teal-lt)}

/* NAV BUTTONS */
.nav-btn{width:100%;text-align:left;padding:8px 10px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-family:var(--font);font-weight:500;color:var(--ink2);background:transparent;display:flex;align-items:center;gap:9px;transition:all .12s;margin-bottom:2px}
.nav-btn:hover:not(.active){background:var(--bg)}
.nav-btn.active{background:linear-gradient(90deg,var(--teal-lt),#fff);color:var(--teal-dk);font-weight:700;border-left:3px solid var(--teal)}
.nav-btn .nav-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--bg2);flex-shrink:0}
.nav-btn.active .nav-icon{background:var(--teal-mid)}

/* CONTEXT PILLS */
.ctx-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .12s;user-select:none}
.ctx-pill.active{background:var(--teal-lt);color:var(--teal-dk);border-color:var(--teal-mid)}
.ctx-pill:not(.active){background:var(--bg);color:var(--ink3);border-color:var(--border)}
.ctx-pill:hover:not(.active){border-color:var(--teal-mid);color:var(--teal-dk)}

/* MAIN AREA */
.main-scroll{flex:1;overflow-y:auto;padding:16px 20px;min-width:0;overflow-x:hidden}
.card{background:var(--white);border-radius:10px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(13,27,42,.08)}

/* TEXTAREA */
.query-box{width:100%;border:2px solid var(--border2);border-radius:8px;padding:14px;font-size:13.5px;font-family:var(--font);color:var(--ink);line-height:1.65;resize:none;transition:border .15s;background:#fff}
.query-box:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,119,204,.12)}

/* BUTTONS */
.btn-primary{background:linear-gradient(135deg,#0077CC,#2D6BE4);color:#fff;border:none;border-radius:7px;padding:9px 22px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:7px;transition:all .15s;box-shadow:0 2px 8px rgba(0,119,204,.3)}
.btn-primary:hover{background:linear-gradient(135deg,#005FA3,#1A4FC4);box-shadow:0 4px 14px rgba(0,119,204,.4);transform:translateY(-1px)}
.btn-primary:disabled{background:var(--ink4);cursor:not-allowed}
.btn-secondary{background:var(--white);color:var(--ink2);border:1px solid var(--border2);border-radius:7px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .12s}
.btn-secondary:hover{border-color:var(--teal);color:var(--teal-dk)}

/* TABS */
.tab-bar{display:flex;border-bottom:2px solid var(--border);background:var(--bg2);border-radius:10px 10px 0 0;overflow:hidden}
.tab-btn{padding:9px 14px;border:none;background:transparent;font-size:11.5px;font-weight:600;color:var(--ink3);cursor:pointer;font-family:var(--font);letter-spacing:.03em;border-bottom:3px solid transparent;transition:all .12s;white-space:nowrap}
.tab-btn:hover:not(.active){color:var(--ink);background:rgba(0,0,0,.03)}
.tab-btn.active{color:var(--teal-dk);border-bottom-color:var(--teal);border-bottom-width:3px;background:var(--white);font-weight:700}

/* STANDARD RESULT CARD */
.std-result{border-radius:10px;border:1px solid var(--border);background:var(--white);overflow:hidden;margin-bottom:16px;box-shadow:0 3px 12px rgba(13,27,42,.1)}
.std-result-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.std-id-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:4px;font-family:var(--mono);letter-spacing:.03em}
.complexity-badge{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:3px;text-transform:uppercase;letter-spacing:.06em}
.b-low{background:var(--green-lt);color:var(--green)}
.b-med{background:var(--orange-lt);color:#92400e}
.b-high{background:var(--red-lt);color:var(--red)}

/* ANALYSIS SECTIONS */
.analysis-block{padding:16px;border-bottom:1px solid var(--border);font-size:13px;line-height:1.75;color:var(--ink2);word-break:break-word;overflow-wrap:break-word}
.analysis-block:last-child{border-bottom:none}
.analysis-label{font-size:10.5px;font-weight:700;color:var(--teal-dk);text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.step-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.step-row:last-child{border-bottom:none}
.step-num{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#0077CC,#2D6BE4);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;box-shadow:0 2px 6px rgba(0,119,204,.35)}
.step-content{flex:1}
.step-title{font-weight:600;color:var(--ink);font-size:13px;margin-bottom:3px}
.step-detail{color:var(--ink2);font-size:12.5px;line-height:1.65}
.para-tag{background:var(--teal-lt);color:var(--teal-dk);font-size:10px;font-weight:700;padding:1px 7px;border-radius:3px;margin-left:6px;font-family:var(--mono)}

/* JOURNAL TABLE */
.je-table{width:100%;border-collapse:collapse;font-size:12.5px;table-layout:fixed;word-break:break-word}
.je-table th{background:var(--ink);color:#fff;padding:8px 12px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.je-table td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--ink2);font-family:var(--mono);font-size:12px}
.je-table .dr{color:#1a56db;font-weight:600}
.je-table .cr{color:var(--green);font-weight:600;padding-left:28px}
.je-table .narr{font-style:italic;color:var(--ink3);font-family:var(--font);background:var(--bg)}
.je-table tr:last-child td{border-bottom:none}

/* BALANCE SHEET / PNL TABLE */
.fs-table{width:100%;border-collapse:collapse;font-size:12.5px;table-layout:fixed;word-break:break-word}
.fs-table th{background:var(--blue-dk);color:#fff;padding:8px 12px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.04em}
.fs-table td{padding:7px 12px;border-bottom:1px solid var(--border);color:var(--ink2)}
.fs-table .fs-head{background:var(--bg2);font-weight:700;color:var(--ink);font-size:12px}
.fs-table .fs-sub{padding-left:28px;font-size:12px}
.fs-table .fs-total{font-weight:700;color:var(--ink);background:var(--teal-lt);border-top:2px solid var(--teal-mid)}
.fs-table .positive{color:var(--green);font-weight:600}
.fs-table .negative{color:var(--red);font-weight:600}
.fs-table .neutral{color:var(--blue);font-weight:600}

/* DISCLOSURE / RISK CARDS */
.d-block{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:12px 14px;margin-bottom:8px;font-size:13px;line-height:1.7}
.d-block-title{font-weight:600;color:var(--ink);margin-bottom:4px;font-size:13px}
.risk-row{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border)}
.risk-row:last-child{border-bottom:none}

/* FOLLOW-UP CHIPS */
.follow-chip{background:var(--bg);border:1px solid var(--border2);color:var(--ink2);padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;transition:all .12s;font-weight:500;display:inline-block}
.follow-chip:hover{background:var(--teal-lt);border-color:var(--teal);color:var(--teal-dk);transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,119,204,.15)}

/* CASE STUDY CARDS */
.cs-card{border:1px solid var(--border);border-radius:9px;padding:14px;cursor:pointer;transition:all .15s;background:var(--white)}
.cs-card:hover{border-color:var(--teal);box-shadow:0 6px 20px rgba(0,119,204,.15);transform:translateY(-3px)}

/* UPLOAD ZONE */
.upload-zone{border:2px dashed var(--border2);border-radius:8px;padding:28px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg)}
.upload-zone:hover{border-color:var(--teal);background:var(--teal-lt)}

/* INSIGHT BOX */
.insight-box{background:linear-gradient(135deg,#EEF4FF,#F5F9FF);border:1px solid var(--teal-mid);border-radius:8px;padding:12px 14px;margin-bottom:12px;font-size:12.5px;line-height:1.7;color:var(--ink)}
.insight-box.warning{background:var(--orange-lt);border-color:#FED7AA;color:#7c3c00}
.insight-box.alert{background:var(--red-lt);border-color:#FECACA;color:#7f1d1d}
.insight-box.success{background:var(--green-lt);border-color:#BBF7D0;color:#14532d}

/* MEMO */
.memo-block{border-left:3px solid var(--teal);padding-left:14px;margin-bottom:16px}
.memo-label{font-size:10.5px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}

/* EXAMPLE ITEMS */
.example-item{font-size:12px;color:var(--ink2);padding:6px 8px;border-radius:5px;cursor:pointer;margin-bottom:2px;border-left:2px solid var(--border);transition:all .12s;line-height:1.45}
.example-item:hover{background:var(--teal-lt);border-left-color:var(--teal);border-left-width:3px;color:var(--teal-dk)}

/* SPINNER */
.animate-spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* FOOTER */
.app-footer{background:var(--grad-header);color:rgba(255,255,255,.5);font-size:10.5px}

/* RESPONSIVE */
@media (max-width:900px){
  .sidebar{width:220px;min-width:220px}
}
@media (max-width:700px){
  .sidebar{display:none}
  .main-scroll{padding:12px}
}
/* SCROLLBAR nicer */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--teal-mid);border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:var(--teal)}

/* PRINT */
@media print{.no-print{display:none!important}.sidebar{display:none!important}.app-header{display:none!important}body{background:#fff}.card{box-shadow:none}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback}=React;

/* ═══════════════════════════════════════════════════════════
   KNOWLEDGE BASE — MASSIVELY UPGRADED WITH DEEP DIVE CONTENT
   ═══════════════════════════════════════════════════════════ */
const STDS={
'116':{id:'Ind AS 116',title:'Leases',color:'#7c3aed',bg:'#f5f3ff',complexity:'High',
  keywords:['lease','lessee','lessor','rent','rental','right of use','rou','rou asset','right-of-use','finance lease','operating lease','sublease','sale and leaseback','short term','low value','leasing','rental agreement','tenancy','lease liability','office lease','vehicle lease','equipment lease','building rent','shop rent','factory rent','rented','leased','monthly rent','annual rent','taken on lease','pay rent','paying rent','lease agreement','hire','on hire','monthly payment building','monthly payment office'],
  keyParas:['Para 9','Para 19-21','Para 26-27','Para 36-46','Para 47-50','Para 52-60'],
  financialImpact:{
    balanceSheet:[
      {section:'Non-Current Assets',item:'Right-of-Use (ROU) Asset',treatment:'ADDED — the present value of all future lease payments. For a 5-year lease at ₹1 lakh/month at 9% IBR, the ROU Asset is approximately ₹47.1 lakh on Day 1.',movement:'Increases Assets significantly'},
      {section:'Non-Current Liabilities',item:'Lease Liability (Long-term portion)',treatment:'ADDED — same as ROU Asset on Day 1. Reduces each year as monthly payments are made (principal portion). The portion due within 12 months is shown under Current Liabilities.',movement:'Increases Liabilities significantly'},
      {section:'Current Liabilities',item:'Lease Liability (Current portion)',treatment:'The 12-month principal repayment portion of the lease liability, reclassified here each year.',movement:'Shown separately under current liabilities'},
    ],
    pandl:[
      {item:'Depreciation Expense',treatment:'ROU Asset is depreciated over the shorter of lease term or useful life. For a ₹47.1L asset over 5 years = ~₹9.4L per year (straight-line). Goes to Operating Expenses.',direction:'Increases operating expense'},
      {item:'Finance Cost (Interest)',treatment:'Each payment is split — interest (IBR × opening liability) goes to P&L as Finance Cost. Interest is front-loaded (higher in early years). For ₹47.1L at 9%, Year 1 interest ≈ ₹4.2L.',direction:'Increases finance cost below EBITDA'},
      {item:'Rent / Lease Expense ELIMINATED',treatment:'Under Ind AS 116, the old straight-line rent expense is REMOVED from operating costs. EBITDA actually IMPROVES because rent no longer appears as an operating expense.',direction:'EBITDA improves'},
    ],
    ratioImpact:[
      {ratio:'EBITDA',direction:'↑ IMPROVES',reason:'Rent expense moved below EBITDA line (split into Depreciation + Interest)'},
      {ratio:'Net Profit (early years)',direction:'↓ WORSENS slightly',reason:'Interest front-loading means higher P&L charge in early years vs straight-line rent'},
      {ratio:'Debt / Equity Ratio',direction:'↑ WORSENS',reason:'Lease liability adds to debt; analysts often compute "lease-adjusted net debt"'},
      {ratio:'Interest Coverage',direction:'↓ WORSENS',reason:'Finance cost increases by the interest element of all lease payments'},
      {ratio:'Operating Cash Flow',direction:'↑ IMPROVES',reason:'Principal repayment of lease moves to Financing Activities; OCF looks better'},
    ]
  },
  steps:[
    {n:'Step 1',title:'Is this a Lease? (Ind AS 116 Para 9)',para:'Para 9',detail:'A lease exists when you have the RIGHT TO CONTROL the use of an identified asset for a period of time, in exchange for payment. Two conditions must both be met: (1) You have the right to obtain substantially all economic benefits from using the asset. (2) You have the right to direct HOW and FOR WHAT PURPOSE the asset is used. Simply hiring a car for a day where the supplier can swap out the car — that is a service contract, not a lease. Signing a 5-year office lease where you have full control of that specific office — that IS a lease.'},
    {n:'Step 2',title:'Determine the Lease Term',para:'Para 19-21',detail:'The lease term is NOT just the initial non-cancellable period. You must add: (a) All optional renewal periods where it is REASONABLY CERTAIN you will renew (e.g., if your business depends on this office location, renewal is reasonably certain). (b) MINUS optional termination periods where it is reasonably certain you will NOT terminate early. Example: A 3-year lease with a 2-year renewal option that is likely to be exercised = 5-year lease term for accounting purposes.'},
    {n:'Step 3',title:'Calculate the Lease Liability (Present Value)',para:'Para 26',detail:'The Lease Liability = Present Value of all future lease payments, discounted at the Incremental Borrowing Rate (IBR) — the rate you would pay if you borrowed money to buy this asset. Include: fixed lease payments (less any lease incentives), variable payments linked to an index/rate, residual value guarantees, exercise price of purchase options (if reasonably certain to exercise), and penalties for termination (if reasonably certain to terminate). Example: ₹1 lakh/month × 60 months (5 years) at 9% IBR annual → PV ≈ ₹47.1 lakh.'},
    {n:'Step 4',title:'Recognise ROU Asset',para:'Para 24',detail:'ROU Asset = Lease Liability + Any lease payments made BEFORE commencement + Initial direct costs (legal fees, brokerage) + Estimated cost of restoration (dismantling/restoring the asset at end of lease). In most simple cases: ROU Asset ≈ Lease Liability on Day 1.'},
    {n:'Step 5',title:'Subsequent Measurement — Monthly Entries',para:'Para 36-46',detail:'Each period: (1) Depreciate the ROU Asset over the lease term (straight-line unless another pattern is more appropriate). (2) Unwind the Lease Liability using the effective interest method: each monthly payment is split into Interest (IBR × opening liability) → goes to Finance Cost in P&L, and Principal → reduces the Lease Liability. The interest portion is higher in early months and reduces over time as the outstanding liability decreases.'},
  ],
  disclosures:[
    {head:'ROU Asset Disclosure (Para 53)',body:'Separate ROU Asset by class of underlying asset (buildings, vehicles, machinery). Show opening balance, additions, depreciation, impairment, and closing balance in a roll-forward schedule. This appears in the Notes to Financial Statements under Fixed Assets / Property, Plant & Equipment.'},
    {head:'Lease Liability Maturity Analysis (Para 58)',body:'Undiscounted future cash flows split into: less than 1 year, 1-5 years, and more than 5 years. Plus a reconciliation back to the carrying amount of lease liability. This is a KEY disclosure that banks and analysts use to understand your debt obligations.'},
    {head:'Short-Term and Low-Value Exemptions (Para 60)',body:'Disclose the total short-term lease expense and low-value lease expense recognised in P&L during the year. Explain the basis for using these exemptions.'},
    {head:'Key Judgements (Para 59)',body:'Disclose the IBR used, how lease terms were determined (especially for renewal options), and any significant assumptions made.'},
  ],
  auditRisks:[
    {risk:'Lease population completeness — embedded leases in service contracts',level:'High',proc:'Review all significant service contracts, outsourcing agreements, and vendor contracts to identify embedded leases. Common examples: IT infrastructure outsourcing (dedicated servers), logistics contracts (dedicated vehicles), factory contracts (dedicated production lines).'},
    {risk:'IBR (Incremental Borrowing Rate) determination',level:'High',proc:'Verify the IBR reflects a rate the company would pay on secured borrowing for similar tenure and currency. Involve a credit specialist or treasury team. Compare to actual borrowing rates in the market. Challenge if the IBR seems unusually low (this understates the liability).'},
    {risk:'Lease term — renewal option assessment',level:'Medium',proc:'Challenge management\'s assessment of whether renewal options are "reasonably certain" to be exercised. Key factors: location importance, specialised assets, historical renewal patterns, and business plans. Companies often under-estimate lease term to reduce liability.'},
    {risk:'Short-term and low-value lease exemption misuse',level:'Medium',proc:'Verify that leases claimed as "short-term" are genuinely under 12 months (considering renewal options). Low-value threshold (~$5,000 / ₹4 lakh when new) — check actual asset values, not current market values.'},
  ],
  followUps:['How is the IBR (Incremental Borrowing Rate) determined?','What is the short-term lease exemption?','How do I account for a lease modification?','What is the impact of Ind AS 116 on EBITDA and debt covenants?','How is sale-and-leaseback treated under Ind AS 116?'],
},

'16':{id:'Ind AS 16',title:'Property, Plant and Equipment',color:'#b45309',bg:'#fffbeb',complexity:'Medium',
  keywords:['ppe','property','plant','equipment','machinery','building','land','depreciation','capex','capital expenditure','componentization','revaluation','residual value','useful life','borrowing cost','dismantling','decommissioning','subsequent expenditure','fixed asset','fixed assets','purchase building','buy building','bought building','building purchase','construction','office building','factory','warehouse','purchase machinery','bought machine','bought machinery','capital asset'],
  keyParas:['Para 7-14','Para 15-22','Para 43-62','Para 67-72','Para 73-77'],
  financialImpact:{
    balanceSheet:[
      {section:'Non-Current Assets',item:'Property, Plant & Equipment (PPE)',treatment:'CAPITALISED at cost — not expensed in P&L. The cost includes: purchase price + import duties + directly attributable costs (freight, installation, testing, professional fees) + borrowing costs during construction (Ind AS 23) + decommissioning provision (Ind AS 37). Shown NET of accumulated depreciation.',movement:'Increases assets on acquisition; reduces gradually via depreciation'},
      {section:'Non-Current Assets',item:'Capital Work in Progress (CWIP)',treatment:'Costs accumulated BEFORE the asset is ready for use are shown as CWIP, not PPE. Transferred to PPE when the asset is ready for its intended use and depreciation begins.',movement:'Temporary balance during construction; nil once asset is complete'},
      {section:'Non-Current Liabilities',item:'Decommissioning / Asset Retirement Obligation',treatment:'If you are legally required to dismantle the asset at end of life (e.g., oil wells, factory with hazardous materials), the PRESENT VALUE of that future cost is recognised as a liability on Day 1, with a corresponding addition to the asset cost.',movement:'Liability recognised upfront; unwound over asset life'},
    ],
    pandl:[
      {item:'Depreciation Expense',treatment:'Annual cost = (Cost − Residual Value) ÷ Useful Life (SLM method). For a building worth ₹1,00,000 lakh with 10% residual value and 40-year life: Annual depreciation = (₹1,00,000L × 90%) ÷ 40 = ₹2,250 lakh per year. Charged to P&L each year.',direction:'Increases operating expense every year'},
      {item:'No Revenue Expense',treatment:'The purchase price of the building does NOT appear in P&L. Only the annual depreciation does. This is the key difference from a lease — no monthly rent/lease expense, only depreciation.',direction:'Lower expense than leasing in the short term'},
      {item:'Interest / Finance Cost (if borrowed)',treatment:'If you took a loan to buy the building, the interest on that loan goes to P&L as Finance Cost each year (unless it is a qualifying asset under construction — then interest is capitalised per Ind AS 23).',direction:'Finance cost increases if building was debt-financed'},
    ],
    ratioImpact:[

  steps:[
    {n:'Step 1',title:'Identify: Should this be PPE or an Operating Expense?',para:'Para 7',detail:'An item is recognised as PPE (Balance Sheet asset) ONLY when: (1) It is PROBABLE that future economic benefits will flow from the asset, AND (2) The cost can be measured reliably. Day-to-day maintenance and repairs do NOT qualify — they are expensed in P&L. Only expenditures that INCREASE future economic benefits (extend life, increase capacity, improve quality) can be capitalised.'},
    {n:'Step 2',title:'Determine the Cost of the Asset',para:'Para 15-22',detail:'Cost = Purchase price (net of trade discounts) + Import duties and non-refundable taxes (NOT GST input credit, which is recoverable) + Freight and insurance + Site preparation + Installation and assembly costs + Testing costs (net of test product revenues) + Professional fees (architects, engineers) + Borrowing costs during construction (Ind AS 23) + Estimated decommissioning cost (Ind AS 37). For your ₹1,00,000 lakh building purchase — the entire purchase price is the PPE cost.'},
    {n:'Step 3',title:'Component Accounting',para:'Para 43-47',detail:'MAJOR change from old AS. If your building has components with SIGNIFICANTLY DIFFERENT useful lives, each must be identified and depreciated separately. Example for a ₹1,00,000 lakh building: (a) Structural shell (walls, roof) — 40 years, (b) MEP systems (electrical, plumbing, HVAC) — 15 years, (c) Interior fit-outs — 8-10 years. Each component is depreciated over its own useful life, giving a more accurate expense pattern.'},
    {n:'Step 4',title:'Depreciate Over Useful Life',para:'Para 50-57',detail:'Depreciation methods allowed: (1) Straight-Line Method (SLM) — equal annual charge. (2) Written-Down Value / Diminishing Balance — higher in early years. (3) Units of Production — based on actual usage. No prescribed minimum useful life under Ind AS — management must determine based on expected use. Note: Schedule II of Companies Act 2013 prescribes useful lives for Indian companies — this must be aligned. Buildings: 30-60 years typically.'},
    {n:'Step 5',title:'Subsequent Costs — Repair vs Capital Expenditure',para:'Para 10-14',detail:'KEY DISTINCTION: (a) Routine repairs and maintenance → EXPENSE immediately in P&L. (b) Major inspections / overhauls that are necessary to use the asset → CAPITALISE as a new component and depreciate. (c) Improvements that enhance future economic benefits → CAPITALISE the improvement. Example: Repainting the building = expense. Replacing the roof with a new material that extends life by 10 years = capitalise as a new component.'},
  ],
  disclosures:[
    {head:'PPE Schedule / Fixed Asset Register (Para 73-74)',body:'Gross carrying amount and accumulated depreciation at beginning and end, additions, disposals, transfers, revaluation amounts, impairment losses recognised/reversed during the period. This is a mandatory note in every set of financial statements.'},
    {head:'Depreciation Policy (Para 73)',body:'Disclosure of depreciation method used for each class, useful lives or rates applied, residual values, and any significant changes in useful life estimates during the year.'},
    {head:'Revaluation (Para 77)',body:'If the revaluation model is adopted: effective date, independent valuer involvement, methods and assumptions, carrying amount under cost model, and revaluation surplus in equity.'},

  auditRisks:[

    {risk:'Useful life and residual value — are they realistic?',level:'Medium',proc:'Challenge management\'s useful life estimates against: historical usage patterns, industry norms, physical condition of assets, and any plans for asset replacement. A company that consistently inflates useful lives will show lower depreciation and higher profits.'},
    {risk:'Component accounting — are components properly identified?',level:'Medium',proc:'For large assets (buildings, plant), verify that components with significantly different useful lives have been separately identified. Non-compliance inflates or deflates annual depreciation charges.'},
    {risk:'Impairment indicators — has any PPE suffered impairment?',level:'High',proc:'Check for impairment indicators per Ind AS 36: declining revenues, physical damage, technology obsolescence, idle assets, regulatory changes. If indicators exist, a formal impairment test (recoverable amount calculation) is required.'},

'115':{id:'Ind AS 115',title:'Revenue from Contracts with Customers',color:'#1a4fa8',bg:'#eff6ff',complexity:'High',

  keyParas:['Para 9-16','Para 22-30','Para 31-38','Para 47-72','Para 73-86','Para 106-129'],

      {section:'Current Assets',item:'Contract Asset (Unbilled Revenue)',treatment:'Revenue earned but NOT yet billed (you performed but invoice not raised). Transferred to Trade Receivable once the right to payment is unconditional (invoice raised). Common in IT project companies.',movement:'Increases assets; reflects work done but not billed'},

    ],
    pandl:[
      {item:'Revenue from Operations',treatment:'Recognised WHEN or AS performance obligations are satisfied — either OVER TIME (subscriptions, long-term contracts) or AT A POINT IN TIME (goods delivery, one-time licenses). Never earlier.',direction:'The TOP line of the P&L'},
      {item:'Variable Consideration (Constraint)',treatment:'Bonuses, penalties, incentives, rebates — include in revenue ONLY if it is HIGHLY PROBABLE that a significant reversal will NOT occur later.',direction:'Affects revenue recognition timing and amount'},
    ],
    ratioImpact:[
      {ratio:'Revenue',direction:'Timing shift',reason:'Revenue may be front-loaded or back-loaded vs old AS 9, depending on contract structure'},

      {ratio:'EBITDA Margin',direction:'May change',reason:'Revenue timing changes affect margin percentages even if total cash is same'},
    ]
  },
  steps:[
    {n:'Step 1',title:'Identify the Contract',para:'Para 9-16',detail:'A contract must have: (a) Approved by all parties (written, oral, or implied), (b) Identifiable rights and obligations, (c) Clear payment terms, (d) Commercial substance (expected cash flows change), (e) Probable collection. No contract = no revenue. Cash received without a qualifying contract = liability (deposit).'},
    {n:'Step 2',title:'Identify Performance Obligations',para:'Para 22-30',detail:'Separate each distinct promise to transfer goods/services. A good/service is DISTINCT if: (a) Customer can benefit from it on its own or with available resources (it has standalone value), AND (b) The promise is separable from other promises in the contract. Example: SaaS license + implementation + support = 3 separate performance obligations (each can be sold separately and used independently).'},
    {n:'Step 3',title:'Determine the Transaction Price',para:'Para 47-72',detail:'The expected consideration = fixed price + variable consideration (bonuses/penalties constrained to highly probable amount) ± significant financing component (adjust for time value if payment is deferred \u003E12 months) ± non-cash consideration (at fair value). Variable consideration is included ONLY to the extent that a significant revenue reversal is not highly probable.'},
    {n:'Step 4',title:'Allocate Transaction Price',para:'Para 73-86',detail:'Allocate based on Relative Standalone Selling Prices (SSP) — what you would charge if selling each obligation separately. If a ₹100 bundle consists of services with SSP of ₹60 + ₹40 = ₹100, allocate proportionally. If there is a bundle discount (total SSP \u003E contract price), allocate the discount proportionately unless specific allocation is more appropriate.'},
    {n:'Step 5',title:'Recognise Revenue',para:'Para 31-38',detail:'Revenue is recognised OVER TIME if any ONE of: (a) Customer simultaneously receives and consumes benefits (cleaning service, monthly support), (b) Company creates/enhances a customer-controlled asset (construction on customer\'s land), (c) No alternative use for the asset + right to payment for performance to date (custom software). OTHERWISE — revenue is recognised at POINT IN TIME when control transfers (goods delivery, license key handover).'},
  ],
  disclosures:[
    {head:'Revenue Disaggregation (Para 114-115)',body:'Break down revenue by type of good/service, geography, market segment, timing (over time vs point in time), and contract type. SEBI requires this quarterly for listed companies. This is the most visible revenue note.'},
    {head:'Contract Balances (Para 116)',body:'Opening and closing balances of contract assets, contract liabilities, and trade receivables. Explain significant changes — how much revenue was recognised from the opening contract liability balance? Any significant contract assets written off as impaired?'},
    {head:'Performance Obligations (Para 119)',body:'Describe each significant performance obligation, when it is typically satisfied, significant payment terms, and obligations for returns/refunds. Include remaining performance obligation disclosure (backlog) for long-term contracts.'},
    {head:'Significant Judgements (Para 123-126)',body:'Judgements made in determining timing of satisfaction, methods used for over-time recognition, and estimates made for transaction price (especially variable consideration and SSP).'},
  ],
  auditRisks:[
    {risk:'Completeness of performance obligations — all distinct promises identified?',level:'High',proc:'Read all significant contracts end-to-end. Identify every deliverable, warranty, right, and option. Assess whether warranties are assurance-type (Ind AS 37) or service-type (Ind AS 115 performance obligation).'},
    {risk:'Variable consideration constraint — is the constraint appropriately applied?',level:'High',proc:'For performance bonuses, rebates, and penalties — test whether management\'s probability assessment is reasonable. Review historical experience of achieving targets. Check if subsequent events confirm or contradict the estimate.'},
    {risk:'Revenue cut-off — is revenue recognised in the correct period?',level:'High',proc:'Test deliveries and services around period end. Agree revenue to delivery evidence (POD, completion certificates, acceptance sign-offs). Test deferred revenue and unbilled revenue balances for reasonableness.'},
  ],
  followUps:['How to account for contract modifications under Ind AS 115?','What is the significant financing component?','How to determine Standalone Selling Prices?','How is warranty treated under Ind AS 115?'],

'109':{id:'Ind AS 109',title:'Financial Instruments — Recognition, Classification & ECL',color:'#0f766e',bg:'#f0fdfa',complexity:'High',
  keywords:['financial instrument','loan','bond','investment','derivative','hedge','hedging','forward','swap','option','ecl','expected credit loss','impairment','fvtpl','fvoci','amortized cost','fair value','receivable','borrowing','debenture','ncd','preference share','equity instrument','debt instrument','credit loss','stage','provision matrix','banking','financial asset','financial liability','mutual fund','shares','equity shares','debt fund'],
  keyParas:['Para 4.1','Para 5.1-5.2','Para 5.5','Para 6.1-6.5'],
  financialImpact:{
    balanceSheet:[
      {section:'Assets — Financial Assets',item:'Classification determines measurement',treatment:'Amortised Cost (hold to collect, SPPI test passed): shown at amortised cost using EIR. FVOCI Debt: shown at fair value; changes in OCI. FVTPL: shown at fair value; all changes in P&L immediately.',movement:'FV instruments fluctuate with market'},

    pandl:[
      {item:'Interest Income (Effective Interest Rate)',treatment:'On amortised cost instruments: interest recognised using EIR method, not just contractual rate. Includes amortisation of origination fees, discounts, premiums over instrument life.',direction:'Income — top of P&L (for banks, this is primary revenue)'},
      {item:'ECL Charge (Impairment Loss)',treatment:'Provision created for expected credit losses goes to P&L. INCREASES when credit quality deteriorates; REVERSES when it improves. For Stage 3 (defaulted), interest is on NET carrying amount (after ECL).',direction:'Expense — reduces profit; highly volatile for banks'},
      {item:'Fair Value Gains/Losses (FVTPL)',treatment:'ALL fair value changes for FVTPL instruments go directly to P&L every reporting period. Mutual fund NAV changes, equity share price movements — all hit P&L immediately.',direction:'Volatile — increases/decreases with market'},

    ratioImpact:[
      {ratio:'Provisions / ECL',direction:'↑ HIGHER',reason:'Forward-looking ECL vs old incurred-loss model means provisions recognised earlier'},
      {ratio:'P&L Volatility',direction:'↑ INCREASES',reason:'FVTPL instruments mark-to-market every quarter affecting earnings'},
      {ratio:'Net NPA (for banks)',direction:'Different from GNPA',reason:'ECL-adjusted carrying values differ from RBI IRACP classifications; reconciliation required'},

  steps:[
    {n:'Step 1',title:'Classification — The Two-Test Framework',para:'Para 4.1',detail:'For DEBT instruments (loans, bonds): Test (1) Business Model — what is the entity\'s objective? (a) Hold to collect cash flows only → Amortised Cost. (b) Hold to collect AND sell → FVOCI. (c) Trading / residual → FVTPL. Test (2) SPPI — do contractual cash flows represent Solely Payments of Principal and Interest? If NO → must be FVTPL. For EQUITY instruments: default is FVTPL. Irrevocable election allowed for FVOCI (strategic holdings) — but gains/losses NEVER recycle to P&L.'},
    {n:'Step 2',title:'Initial Measurement',para:'Para 5.1',detail:'FVTPL instruments: measured at FAIR VALUE ONLY on day 1 (transaction costs expensed immediately to P&L). Amortised cost and FVOCI: measured at fair value PLUS transaction costs (costs are capitalised into the carrying amount and amortised via EIR).'},
    {n:'Step 3',title:'ECL — Expected Credit Loss Model',para:'Para 5.5',detail:'The most significant change from old AS. Must estimate and recognise credit losses BEFORE they occur. Stage 1 (performing, no significant credit risk increase): 12-month ECL. Stage 2 (significant increase in credit risk): Lifetime ECL. Stage 3 (credit-impaired/defaulted): Lifetime ECL + interest on net amount. For trade receivables: Simplified Approach — always lifetime ECL using a Provision Matrix based on historical default rates by ageing bucket.'},
    {n:'Step 4',title:'Hedge Accounting (Optional)',para:'Para 6',detail:'Three types: (1) Fair Value Hedge — hedging changes in fair value (e.g., fixed-rate debt hedged with pay-float interest rate swap). Hedging gain/loss goes to P&L; hedged item adjusted for fair value change through P&L. (2) Cash Flow Hedge — hedging variability in future cash flows (e.g., dollar export hedged with forward contract). Effective portion goes to OCI; recycled to P&L when hedged item affects P&L. (3) Net Investment Hedge — hedging forex risk on net investment in foreign subsidiary.'},
  ],
  disclosures:[
    {head:'Carrying Amounts by Category (Para 8)',body:'Table showing carrying amounts of: financial assets at amortised cost, FVOCI (debt), FVOCI (equity), FVTPL — reconciled to balance sheet line items. Also show financial liabilities at amortised cost and FVTPL.'},
    {head:'ECL Disclosures (Para 35H-35N)',body:'Roll-forward of loss allowance by class and stage. Gross carrying amounts by credit quality grade (internal credit ratings). Inputs, assumptions, and estimation techniques used. Write-offs and recoveries during the year.'},
    {head:'Risk Disclosures (Para 31-42)',body:'Credit risk: maximum exposure, collateral, credit quality analysis. Liquidity risk: maturity analysis of financial liabilities. Market risk: interest rate risk (sensitivity), currency risk (sensitivity), other price risk.'},
  ],
  auditRisks:[
    {risk:'SPPI test — are unusual contractual cash flow features identified?',level:'High',proc:'Review contractual terms of all debt instruments for non-SPPI features (convertibility, equity-linked returns, contingent payments). These must be classified as FVTPL.'},
    {risk:'ECL model design and assumptions',level:'High',proc:'Challenge PD (Probability of Default), LGD (Loss Given Default), EAD (Exposure at Default) assumptions. Test provision matrix — are historical rates current? Are macro-economic overlays appropriate and supported?'},
    {risk:'Staging — are significant increases in credit risk properly identified?',level:'High',proc:'Review triggers used for Stage 2 classification. Check if loans on "watchlist" or with covenant breaches are in Stage 2. The 30-day past due rebuttable presumption for Stage 2 must be applied unless compelling evidence otherwise.'},
  ],
  followUps:['How to perform the SPPI test?','How to build an ECL provision matrix?','What triggers Stage 2 classification?','How does cash flow hedge accounting work step by step?'],

'12':{id:'Ind AS 12',title:'Deferred Tax (Income Taxes)',color:'#0c4a6e',bg:'#f0f9ff',complexity:'High',
  keywords:['tax','deferred tax','dta','dtl','deferred tax asset','deferred tax liability','mat','minimum alternate tax','taxable profit','timing difference','temporary difference','income tax','tax rate','tax provision','tax expense'],
  keyParas:['Para 5','Para 15-39','Para 47-56','Para 81-88'],
  financialImpact:{
    balanceSheet:[
      {section:'Non-Current Assets',item:'Deferred Tax Asset (DTA)',treatment:'Recognised when carrying amount of a LIABILITY \u003E its tax base, OR carrying amount of an ASSET \u003C its tax base (deductible temporary difference). Only recognised if PROBABLE that future profits will be available to utilise it. DTA = Deductible Temporary Differences × Tax Rate.',movement:'Increases assets; derecognised if future profits become uncertain'},
      {section:'Non-Current Liabilities',item:'Deferred Tax Liability (DTL)',treatment:'Recognised when carrying amount of an ASSET \u003E its tax base (taxable temporary difference). Almost always recognised. DTL = Taxable Temporary Differences × Tax Rate. Common source: higher tax depreciation (WDV) vs book depreciation (SLM) in early years.',movement:'Increases liabilities; reverses in later years'},
    ],
    pandl:[
      {item:'Deferred Tax Expense / (Credit)',treatment:'If net DTL increases during the year → Deferred Tax Expense (increases tax charge in P&L). If net DTA increases → Deferred Tax Credit (reduces tax charge in P&L). Items going through OCI → deferred tax also goes to OCI.',direction:'Affects effective tax rate — can be significantly different from statutory rate'},
    ],
    ratioImpact:[
      {ratio:'Effective Tax Rate',direction:'Differs from statutory',reason:'Deferred tax creates a gap between statutory rate and effective rate in financial statements'},
      {ratio:'Net Profit',direction:'Volatile',reason:'Large DTA write-offs (like Vodafone Idea) can devastate reported profit in one year'},
    ]
  },
  steps:[
    {n:'Step 1',title:'Balance Sheet Approach — Compare Book vs Tax',para:'Para 5',detail:'Identify the Carrying Amount (book value per Ind AS) and Tax Base (amount recognised for Income Tax Act purposes) of EVERY asset and liability on the Balance Sheet. The difference is a Temporary Difference.'},
    {n:'Step 2',title:'Classify as Taxable or Deductible Temporary Difference',para:'Para 15-24',detail:'Taxable Temporary Difference (will pay MORE tax later) → Deferred Tax LIABILITY. Deductible Temporary Difference (will save tax later) → Deferred Tax ASSET. Common DTL: book depreciation (SLM) \u003C tax depreciation (WDV) in early years, asset carrying amount \u003E tax base. Common DTA: provisions not yet tax-deductible (warranty provisions, ECL provisions, gratuity).'},
    {n:'Step 3',title:'Calculate DTA / DTL',para:'Para 47',detail:'DTA or DTL = Temporary Difference × Enacted Tax Rate. Use the tax rate enacted or substantively enacted by the Balance Sheet date that will apply when the difference reverses. For most Indian companies: 25.168% (including surcharge and cess) for new companies, 34.944% for others.'},
    {n:'Step 4',title:'Recognition — DTA Requires Probability Assessment',para:'Para 24-31',detail:'DTL: Recognise for ALL taxable temporary differences (very limited exceptions). DTA: Recognise ONLY to the extent that it is PROBABLE (more likely than not) that sufficient future taxable profits will be available. This is where MANAGEMENT JUDGEMENT is critical. Loss-making companies must carefully assess whether carried-forward losses can realistically be utilised.'},
  ],
  disclosures:[
    {head:'Tax Reconciliation (Para 81)',body:'Reconciliation of accounting profit × statutory tax rate to actual tax expense. Lists each major item causing a difference (deferred tax, non-deductible expenses, tax credits). Allows users to understand the effective tax rate.'},
    {head:'DTA/DTL Breakdown (Para 81)',body:'Components of deferred tax — each category of temporary difference and the DTA/DTL arising. Helps assess whether management has been aggressive in DTA recognition.'},
  ],
  auditRisks:[
    {risk:'DTA recoverability — future profit projections supportable?',level:'High',proc:'Challenge management projections used to support DTA recognition. Are projections consistent with business plans? Have prior year projections been accurate? For loss-making companies, DTA recognition requires strong substantiation.'},

  ],
  followUps:['What is the difference between DTA and DTL?','How is deferred tax calculated on the ROU Asset and Lease Liability?','When can a DTA for losses be recognised?'],

'36':{id:'Ind AS 36',title:'Impairment of Assets',color:'#dc2626',bg:'#fef2f2',complexity:'High',
  keywords:['impairment','impaired','recoverable','value in use','fair value less costs','cgu','cash generating unit','goodwill impairment','write-down','write-off','carrying amount','recoverable amount','asset decline','asset value','declining value','asset loss'],
  keyParas:['Para 8-17','Para 18-57','Para 58-108'],
  financialImpact:{
    balanceSheet:[
      {section:'Non-Current Assets',item:'PPE / Intangibles / Goodwill',treatment:'Reduced to Recoverable Amount = MAX of (1) Fair Value less costs of disposal, and (2) Value in Use (PV of future cash flows). Impairment = Carrying Amount minus Recoverable Amount. Goodwill impairment is NEVER reversed (Para 124).',movement:'Asset value reduced; impairment loss recognised in P&L'},
    ],
    pandl:[
      {item:'Impairment Loss',treatment:'Recognised in P&L (unless the asset was previously revalued, in which case it first reduces the revaluation surplus in OCI). Reduces asset value on Balance Sheet. For CGUs with goodwill: loss first allocated to goodwill, then proportionately to other assets.',direction:'Significant one-time charge; can materially reduce profit'},
    ],
    ratioImpact:[
      {ratio:'Asset Values',direction:'↓ DECREASES',reason:'Write-down of PPE, goodwill, or intangibles'},
      {ratio:'EPS',direction:'↓ DECREASES',reason:'Impairment is typically a large one-time charge'},
    ]
  },
  steps:[
    {n:'Step 1',title:'Identify Impairment Indicators (Annual Assessment)',para:'Para 8-17',detail:'External indicators: significant decline in market value, adverse changes in technology/market/legal environment, increase in interest rates (raises discount rate), market cap \u003C book value. Internal indicators: asset is idle or to be discontinued, evidence of physical damage, evidence of worse-than-expected performance. Goodwill and indefinite-life intangibles: MUST test annually regardless of indicators.'},
    {n:'Step 2',title:'Calculate Recoverable Amount',para:'Para 18-57',detail:'Recoverable Amount = HIGHER of: (1) Fair Value Less Costs of Disposal (FVLCD) — what you could sell it for in the market, net of selling costs. (2) Value in Use (VIU) — present value of future cash flows the asset is expected to generate, discounted at a pre-tax rate that reflects current market assessments of the time value of money and asset-specific risks.'},
    {n:'Step 3',title:'Recognise Impairment if Carrying Amount \u003E Recoverable Amount',para:'Para 58',detail:'Impairment Loss = Carrying Amount − Recoverable Amount. If the asset is part of a CGU (Cash-Generating Unit — the smallest group of assets generating independent cash flows), the loss is allocated: first to goodwill allocated to the CGU, then proportionately to other assets (but no asset is reduced below its own FVLCD or VIU individually).'},
  ],
  disclosures:[],
  auditRisks:[
    {risk:'VIU model — cash flow forecasts and discount rate',level:'High',proc:'Challenge management\'s revenue growth assumptions in VIU models. Are they consistent with past performance, industry trends, analyst forecasts? Verify the pre-tax discount rate using WACC analysis — a lower discount rate inflates VIU and avoids recognising impairment.'},
    {risk:'CGU definition — are CGUs appropriately defined?',level:'Medium',proc:'Verify CGUs are the smallest identifiable group generating independent cash inflows. Management may define large CGUs to allow stronger assets to "subsidise" impaired ones, avoiding impairment recognition.'},

  followUps:['What is Value in Use and how is it calculated?','How is impairment allocated across a CGU?','Can impairment be reversed on PPE?','When must goodwill be tested for impairment?'],

'37':{id:'Ind AS 37',title:'Provisions, Contingent Liabilities & Assets',color:'#7c3aed',bg:'#f5f3ff',complexity:'Medium',
  keywords:['provision','contingent','liability','probable','warranty','lawsuit','litigation','legal','claim','guarantee','onerous contract','restructuring','contingent liability','contingent asset','sales return provision','return provision','expected returns','refund liability'],
  keyParas:['Para 14-26','Para 36-52','Para 53-65'],
  financialImpact:{
    balanceSheet:[
      {section:'Liabilities',item:'Provision',treatment:'Recognised when: (1) Present obligation from past event, (2) Probable outflow (\u003E50%), (3) Reliable estimate possible. Measured at BEST ESTIMATE of expenditure required. If time value is material (long-term provision), discounted to PV.',movement:'Increases liabilities; may significantly impact gearing'},
      {section:'Contingent Liabilities (Off Balance Sheet)',item:'Disclosed but NOT recognised',treatment:'When outflow is POSSIBLE (not probable). Or when reliable estimate cannot be made. Only disclosed in Notes — no amount on Balance Sheet face.',movement:'Not in numbers — disclosed in notes only'},
    ],
    pandl:[
      {item:'Provision Expense',treatment:'When provision is first recognised → charged to P&L in that period. Unwinding of discount (for long-term provisions) → charged to P&L as Finance Cost each year.',direction:'Reduces profit when recognised; reverses if not utilised'},
    ],
    ratioImpact:[
      {ratio:'Net Profit',direction:'↓ DECREASES',reason:'Provision charge hits P&L immediately when recognised'},
      {ratio:'Total Liabilities',direction:'↑ INCREASES',reason:'Provision added to balance sheet'},
    ]
  },
  steps:[
    {n:'Step 1',title:'Provision or Contingent Liability?',para:'Para 14-26',detail:'PROVISION (recognised on Balance Sheet): Present obligation from past event + Probable outflow (more likely than not, i.e., \u003E50%) + Reliable estimate possible. CONTINGENT LIABILITY (only disclosed in Notes): Possible (not probable) obligation, OR probable but cannot be measured reliably. CONTINGENT ASSET (disclosed in Notes if probable; not recognised): Possible asset that depends on future events outside control.'},
    {n:'Step 2',title:'Measure the Provision — Best Estimate',para:'Para 36-52',detail:'Use management\'s best estimate of the expenditure required to settle the obligation. For a SINGLE obligation: most likely outcome. For a LARGE POPULATION: expected value (probability-weighted). If the time value of money is material (long-term obligations like decommissioning, litigation expected to settle in 5+ years): DISCOUNT to present value using a pre-tax risk-free rate.'},
    {n:'Step 3',title:'Onerous Contracts — Recognise a Provision',para:'Para 66-69',detail:'An onerous contract is one where the UNAVOIDABLE COSTS to fulfil the contract exceed the expected BENEFITS. Example: A construction contract where cost overruns mean you will definitely lose money. You must recognise a provision for the LOWER of: (a) Cost to fulfil (remaining net loss), or (b) Cost to exit (penalties for termination). This is immediately charged to P&L.'},
  ],
  disclosures:[

  ],
  auditRisks:[
